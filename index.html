<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>林芝团建 · 同行助手</title>
<style>
:root{
  /* 主色：天蓝童话（浅粉蓝，透气愉悦） */
  --brand:#5a9fd4;--brand2:#4a8ac4;--brand-soft:#e3f0fb;
  /* 主操作色：珊瑚红（参考图的活力撞色） */
  --cta:#e86a6a;--cta-grad:linear-gradient(135deg,#f07a7a,#e86a6a);
  /* 辅助色（小面积碰撞，制造生机） */
  --ok:#4db89a;--okbg:#e4f7f1;        /* 薄荷绿：机酒/交通/已完成 */
  --purple:#7c6eb8;--purplebg:#f0ecf9;/* 淡靛紫：资讯/公告/贴士 */
  --warn:#e8a03d;--warnbg:#fdf5e6;    /* 杏黄：紧急/重要提醒 */
  --coral:#e86a6a;--coralbg:#fceeeF;  /* 珊瑚红：互动/社交/分组 */
  /* 中性色 */
  --bg:#dcebf6;--bg-grad:linear-gradient(175deg,#d4ebf5 0%,#e0f0fa 40%,#eaf5fc 70%,#f5fafd 100%);
  --card:#ffffff;--ink:#2c3e50;--sub:#6b7f94;--line:#d4e3ef;--line2:#e2eff8;
  --red:#e05555;--redbg:#fdecea;--lock:#e3f0fb;
  /* 林芝晴日 · 统一设计变量（逐页接入，不直接覆盖旧页面） */
  --sun-atmosphere:#e9f9d9;--sun-surface:#ffffff;--sun-blue:#3c9cc7;--sun-blue-deep:#24789d;--sun-blue-soft:#dff1f7;
  --sun-purple:#7e6bdd;--sun-purple-soft:#f0edff;--sun-pink:#f19abc;--sun-pink-soft:#fff0f6;--sun-green:#80c977;--sun-orange:#f1a06f;
  --sun-text:#27352e;--sun-sub:#66766c;--sun-muted:#979d98;--sun-border:#e4e8e3;
  --sun-radius-card:16px;--sun-radius-focus:22px;--sun-space:16px;--sun-border-thin:.5px solid var(--sun-border);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg-grad);position:relative;z-index:1;padding-bottom:64px}
/* splash：高原旅行手帐首页 + 身份选择页 */
.splash{position:fixed;inset:0;background:#6aaddd;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:50;padding:30px}
.splash h1{font-size:26px;margin-bottom:6px;text-align:center}
.splash p{opacity:.9;margin-bottom:40px;font-size:14px;text-align:center}
.role-btn{width:260px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.5);color:#fff;padding:16px;border-radius:20px;font-size:17px;margin-bottom:14px;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.role-btn:active{transform:scale(.97);background:rgba(255,255,255,.32)}
.role-btn b{display:block;font-size:18px}
.role-btn span{font-size:12px;opacity:.8}
.pwd{width:260px;margin-top:6px}
.pwd input{width:100%;padding:12px;border-radius:12px;border:none;font-size:15px;text-align:center}
.pick-search{width:100%;padding:11px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.12);color:#fff;font-size:14px;box-sizing:border-box}
.pick-search::placeholder{color:rgba(255,255,255,.65)}
.pick-list{max-height:230px;overflow:auto;margin-top:8px;background:rgba(255,255,255,.1);border-radius:12px;padding:4px}
.mem-pick{padding:11px 14px;color:#fff;font-size:15px;border-radius:8px;cursor:pointer;transition:.12s}
.mem-pick:active{background:rgba(255,255,255,.25)}
.mem-pick.empty{opacity:.6;cursor:default;text-align:center;font-size:13px}
/* 首页：上方山景只负责氛围，下方暖白面板只负责行动 */
.home-splash{display:block;overflow-y:auto;padding:0;background:var(--bg);color:var(--ink)}
.home-hero{height:36vh;min-height:252px;max-height:330px;position:relative;overflow:hidden;background:#5a9fd4;color:#fff;padding:28px 22px}
.hero-kicker{font-size:13px;letter-spacing:.5px;opacity:.94;margin-bottom:10px}
.hero-title{font-size:26px;line-height:1.25;font-weight:700;letter-spacing:.2px}
.hero-meta{display:inline-flex;align-items:center;margin-top:16px;padding:5px 11px;border-radius:999px;background:#eaf3de;color:#27500a;font-size:12px;font-weight:600}
.hero-mountains{position:absolute;left:0;right:0;bottom:0;width:100%;height:48%;display:block}
.home-panel{position:relative;margin-top:-28px;min-height:calc(64vh + 28px);padding:28px 20px 34px;background:#fffdf8;border-radius:28px 28px 0 0}
.home-eyebrow{display:inline-block;margin-bottom:10px;padding:4px 11px;border-radius:999px;background:#eaf3de;color:#3b6d11;font-size:12px;font-weight:700}
.home-heading{font-size:23px;line-height:1.3;color:#243b53;font-weight:700;margin-bottom:21px;letter-spacing:.1px}
.identity-card{display:flex;align-items:center;width:100%;padding:16px;border:1px solid transparent;border-radius:18px;text-align:left;font:inherit;cursor:pointer;margin-bottom:12px;transition:transform .15s,background .15s}
.identity-card:active{transform:scale(.985)}
.identity-card.member{background:#e1f5ee;border-color:#9fe1cb}
.identity-card.organizer{background:#faeeda;border-color:#fac775}
.identity-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;flex:0 0 44px;border-radius:50%;margin-right:12px}
.member .identity-icon{background:#5dcaa5;color:#fff}
.organizer .identity-icon{background:#ef9f27;color:#fff}
.identity-copy{min-width:0;flex:1}
.identity-title{display:block;font-size:18px;line-height:1.25;color:#243b53;font-weight:700}
.identity-desc{display:block;margin-top:3px;font-size:12px;line-height:1.45;color:#567067}
.organizer .identity-desc{color:#7d6431}
.identity-arrow{margin-left:10px;font-size:26px;line-height:1;color:#0f6e56;font-weight:400}
.organizer .identity-arrow{color:#854f0b}
.home-footer{margin-top:22px;color:#77889a;font-size:12px;text-align:center}
.inline-choice{margin:-2px 0 12px}.inline-member-picker{padding:13px 14px;border-radius:16px;background:#f5fbf9;border:1px solid #cdeadd}.inline-choice-label{font-size:12px;color:#3b6d5b;margin-bottom:8px}.home-splash .pick-search{width:100%;padding:11px 13px;border-radius:12px;border:1px solid #b8dfcc;background:#fff;color:var(--ink);font-size:14px;box-sizing:border-box}.home-splash .pick-search::placeholder{color:#8da99d}.home-splash .pick-list{max-height:190px;overflow:auto;margin-top:8px;background:#fff;border:1px solid #d9eee3;border-radius:12px;padding:2px}.home-splash .mem-pick{padding:10px 12px;color:#315247;font-size:14px;border-radius:8px;cursor:pointer}.home-splash .mem-pick:active{background:#e1f5ee}.home-splash .mem-pick.empty{color:#789086;text-align:center;font-size:13px}.home-splash #pwdbox .pwd{width:100%;margin:0 0 12px}.home-splash #pwdbox .pwd input{border:1px solid #f2c985;background:#fffaf0}.home-splash #pwdbox .role-btn{width:100%;background:#ef9f27;border-color:#ef9f27;margin:10px 0 0;color:#fff;box-shadow:none}.home-splash #pwdbox .role-btn b{font-size:15px}
/* header */
.hd{position:sticky;top:0;background:linear-gradient(135deg,#5a9fd4,#7ab8e2);color:#fff;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;z-index:20;box-shadow:0 2px 14px rgba(90,159,212,.22)}
.hd .t{font-size:18px;font-weight:600;letter-spacing:.3px}
.hd .sw{font-size:12px;background:rgba(255,255,255,.18);padding:5px 10px;border-radius:20px;cursor:pointer;transition:background .2s}
.hd .sw:active{background:rgba(255,255,255,.32)}
/* page */
.page{padding:18px;position:relative}
.card{background:#ffffff;border:1px solid var(--line2);border-radius:20px;padding:20px;margin-bottom:15px;box-shadow:0 3px 20px rgba(90,159,212,.07),0 1px 4px rgba(0,0,0,.03);transition:box-shadow .25s,transform .2s}
.card:active{box-shadow:0 8px 28px rgba(90,159,212,.12),0 2px 8px rgba(0,0,0,.05)}
.card h3{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:6px;color:var(--ink)}
.mod-tag{font-size:12px;padding:3px 10px;border-radius:7px;background:var(--brand-soft);color:var(--brand);font-weight:700;letter-spacing:.5px}
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line2);gap:12px}
.row:last-child{border-bottom:none}
.row .k{color:#5a6b82;font-size:13px;font-weight:500;flex-shrink:0}
.row .v{font-weight:600;text-align:right;word-break:break-word;font-size:14px;color:var(--ink);line-height:1.45}
.row .v.empty{color:#cbd5e1;font-weight:400}
.lockicon{font-size:10px;color:var(--brand);background:var(--brand-soft);padding:1px 5px;border-radius:4px;margin-left:4px}
.big-name{font-size:22px;font-weight:700;margin-bottom:3px;letter-spacing:-.3px;color:var(--ink)}
.dept{color:#5a6b82;font-size:13px;margin-bottom:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.chip{background:var(--brand-soft);color:var(--brand);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600}
.sync-mini-btn{position:absolute;top:10px;right:10px;background:#fff;border:1px solid var(--line2);border-radius:50%;width:32px;height:32px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sync-mini-btn:active{background:var(--brand-soft);transform:scale(.9)}
/* 航班特殊排版 */
.flight-prefix{color:var(--sub);font-size:13px;font-weight:400;margin-right:4px}
.flight-seg{display:block;font-size:13px;line-height:1.6}
.row-flight .v{flex-direction:column;align-items:flex-start}
/* 住宿特殊排版 */
.hotel-mate{font-size:12px;color:#64748b;margin-top:2px}
.row-hotel .v{flex-direction:column;align-items:flex-start}
.btn{display:block;width:100%;background:var(--cta-grad);color:#fff;border:none;padding:14px;border-radius:20px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;box-shadow:0 4px 16px rgba(232,106,106,.3);transition:transform .15s,box-shadow .15s}
.btn:active{transform:translateY(1px);box-shadow:0 2px 8px rgba(232,106,106,.25)}
.btn.ghost{background:#fff;color:var(--brand);border:1.5px solid var(--brand);box-shadow:none}
.btn.sm{width:auto;padding:6px 14px;font-size:13px;display:inline-block;margin:0}
/* form */
.f-item{margin-bottom:14px}
.f-item label{display:block;font-size:13px;color:var(--sub);margin-bottom:5px}
.f-item input,.f-item select{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff}
.sheet textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff;min-height:60px;font-family:inherit;margin-top:6px;box-sizing:border-box}
.f-note{font-size:11px;color:#94a3b8;margin-top:3px}
.sens-badge{font-size:10px;background:var(--redbg);color:var(--red);padding:1px 6px;border-radius:5px;margin-left:5px}
/* schedule · 林芝晴日明亮协调版（仅行程页） */
.schedule-page{--sch-blue:#3c9cc7;--sch-blue-deep:#24789d;--sch-blue-soft:#dff1f7;--sch-purple:#7e6bdd;--sch-purple-soft:#f0edff;--sch-pink:#f19abc;--sch-pink-soft:#fff0f6;--sch-green:#80c977;--sch-green-soft:#e6f7dc;--sch-orange:#f1a06f;--sch-text:#27352e;--sch-sub:#66766c;--sch-muted:#979d98;--sch-border:#e4e8e3;padding-bottom:4px;color:var(--sch-text)}
.schedule-page .route-summary{position:relative;overflow:hidden;margin:-74px 0 16px;min-height:144px;padding:18px;border:.5px solid var(--sch-border);border-radius:22px;background:#cdebf5}
.route-mountains{position:absolute;inset:auto 0 0;width:100%;height:100%;pointer-events:none}.route-copy{position:relative;z-index:1;max-width:73%;padding:14px 16px;border-radius:18px;background:#fff}
.route-title{font-size:16px;line-height:1.3;color:var(--sch-text);font-weight:700;letter-spacing:.1px}.route-subtitle{margin-top:7px;font-size:12px;line-height:1.55;color:#506158;font-weight:500}.route-km{display:inline-flex;margin-top:10px;padding:3px 8px;border-radius:999px;background:#fff0e8;color:#b15d30;font-size:11px;font-weight:700}
.route-toggle{position:absolute;right:18px;bottom:16px;z-index:2;display:inline-flex;align-items:center;padding:5px 9px;border:0;border-radius:999px;background:rgba(255,255,255,.82);color:#3c9cc7;font:inherit;font-size:11px;font-weight:700;cursor:pointer}.route-toggle::after{content:"›";margin-left:4px;font-size:16px;line-height:1}
.route-drawer{margin:-2px 0 16px;padding:5px 15px 9px;background:#fff;border:.5px solid var(--sch-border);border-radius:16px}.route-drawer-title{padding:10px 0 7px;font-size:12px;color:var(--sch-sub);font-weight:700}.route-stop{display:flex;gap:10px;padding:10px 0;border-top:.5px solid var(--sch-border);align-items:flex-start}.route-stop-day{display:inline-flex;align-items:center;justify-content:center;flex:0 0 30px;height:23px;border-radius:9px;background:var(--sch-blue-soft);color:var(--sch-blue-deep);font-size:11px;font-weight:700}.route-stop-main{flex:1;min-width:0;font-size:12px;line-height:1.45;color:var(--sch-text)}.route-stop-km{flex:0 0 auto;font-size:11px;color:var(--sch-muted)}
.sched-tabs{display:flex;gap:8px;overflow-x:auto;margin:0 -2px 18px;padding:2px;-webkit-overflow-scrolling:touch}.sched-tab{display:flex;align-items:center;justify-content:center;gap:5px;min-width:76px;padding:10px 8px;border:.5px solid var(--sch-border);border-radius:14px;background:#fff;color:var(--sch-sub);font-size:11px;cursor:pointer;flex-shrink:0;transition:background .18s,color .18s,border-color .18s}.sched-tab .sched-day{font-size:13px;font-weight:700;color:var(--sch-text)}.sched-tab .sched-date{font-size:11px}.sched-tab.on{background:var(--sch-blue);border-color:var(--sch-blue);color:#fff}.sched-tab.on .sched-day{color:#fff}
.schedule-section-head{display:flex;align-items:center;margin:0 0 12px}.schedule-section-head h2{margin:0;font-size:15px;line-height:1.3;color:var(--sch-text);font-weight:700}
.schedule-timeline{position:relative;margin:0;padding:0}.timeline-item{display:grid;grid-template-columns:48px 20px minmax(0,1fr);gap:9px;position:relative;min-height:80px}.timeline-time{padding-top:12px;font-size:11px;line-height:1;color:var(--sch-sub);font-weight:700;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}.timeline-rail{position:relative;display:flex;justify-content:center}.timeline-rail::before{content:"";position:absolute;top:0;bottom:0;width:1px;background:#d8ded9}.timeline-item:first-child .timeline-rail::before{top:20px}.timeline-item:last-child .timeline-rail::before{bottom:calc(100% - 20px)}.timeline-dot{position:relative;z-index:1;width:11px;height:11px;margin-top:12px;border:2px solid #fff;border-radius:50%;background:var(--sch-green);box-shadow:0 0 0 1px #b8dcb4}.timeline-item.kind-transport .timeline-dot{background:var(--sch-blue);box-shadow:0 0 0 1px #a9dbea}.timeline-item.kind-gathering .timeline-dot{background:var(--sch-purple);box-shadow:0 0 0 1px #c7bdf4}.timeline-item.kind-meal .timeline-dot,.timeline-item.kind-stay .timeline-dot{background:var(--sch-pink);box-shadow:0 0 0 1px #f7c8d9}.timeline-item.kind-activity .timeline-dot{background:var(--sch-green);box-shadow:0 0 0 1px #b8dcb4}
.timeline-card{min-width:0;margin-bottom:14px;padding:12px 13px;background:#fff;border:.5px solid var(--sch-border);border-radius:16px}.timeline-item.kind-gathering .timeline-card{background:var(--sch-purple-soft);border-color:#ded7ff}.timeline-item.kind-meal .timeline-card,.timeline-item.kind-stay .timeline-card{background:var(--sch-pink-soft);border-color:#f8d5e1}.timeline-item.kind-activity .timeline-card{background:var(--sch-green-soft);border-color:#cfe9c9}.timeline-event{font-size:13px;line-height:1.45;color:var(--sch-text);font-weight:700;word-break:break-word}.timeline-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}.timeline-note{min-width:0;font-size:11px;line-height:1.4;color:var(--sch-sub);word-break:break-word}.event-tag{display:inline-flex;align-items:center;flex:0 0 auto;padding:3px 8px;border-radius:999px;font-size:11px;line-height:1.2;font-weight:700;background:rgba(255,255,255,.68)}.event-tag.transport{background:var(--sch-blue-soft);color:var(--sch-blue-deep)}.event-tag.gathering{background:#e6f7dc;color:#427c3e}.event-tag.meal,.event-tag.stay{background:#ffe1ed;color:#a84970}.event-tag.activity{background:rgba(255,255,255,.72);color:#427c3e}
.timeline-admin-actions{display:flex;gap:6px;margin-top:9px}.timeline-admin-actions .mini{padding:3px 8px}.schedule-admin-add{margin:0 0 14px;padding-left:77px}.schedule-admin-add .btn,.schedule-add-day{margin:0;background:var(--sch-blue);border-radius:20px;padding:10px;font-size:13px;box-shadow:none}.schedule-add-day{display:block;width:100%;margin-top:2px}.schedule-empty{padding:38px 18px;text-align:center;color:var(--sch-muted);font-size:13px;background:#fff;border:.5px solid var(--sch-border);border-radius:16px}
#app.schedule-shell .tab.on{color:var(--sch-blue)}
/* notice */
.nt{background:#ffffff;border:1px solid var(--line2);border-radius:18px;padding:15px 18px;margin-bottom:13px;box-shadow:0 3px 20px rgba(90,159,212,.07),0 1px 4px rgba(0,0,0,.03)}
.nt .th{font-weight:600;display:flex;align-items:center;gap:6px;font-size:14px;color:var(--ink)}
.badge-u{font-size:10px;background:var(--warn);color:#fff;padding:1px 8px;border-radius:5px;font-weight:600}
.nt .ct{font-size:13px;color:#374151;margin:6px 0;line-height:1.6}
.nt .mt{font-size:11px;color:var(--sub)}
/* checkin */
.ck{display:flex;justify-content:space-between;align-items:center;background:#ffffff;border:1px solid var(--line2);border-radius:18px;padding:15px 18px;margin-bottom:13px;box-shadow:0 3px 20px rgba(90,159,212,.07),0 1px 4px rgba(0,0,0,.03)}
.ck .info .n{font-weight:600;font-size:14px;color:var(--ink)}
.ck .info .t{font-size:12px;color:var(--sub);margin-top:2px}
.ck .st-done{background:var(--okbg);color:var(--ok);font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px}
.ck .st-btn{background:var(--cta-grad);color:#fff;font-size:13px;font-weight:600;padding:7px 18px;border-radius:20px;cursor:pointer;border:none;box-shadow:0 3px 10px rgba(232,106,106,.28)}
/* groups */
.grp{background:#ffffff;border:1px solid var(--line2);border-radius:18px;padding:15px 18px;margin-bottom:13px;box-shadow:0 3px 20px rgba(90,159,212,.07),0 1px 4px rgba(0,0,0,.03)}
.grp .gh{font-weight:600;margin-bottom:8px;font-size:14px;color:var(--ink)}
.grp .gm{display:flex;flex-wrap:wrap;gap:6px}
.grp .m{background:var(--coralbg);padding:4px 10px;border-radius:16px;font-size:12px;color:#a23a59;transition:transform .15s}
.grp .m.me{background:var(--cta-grad);color:#fff;font-weight:600}
/* members list */
.mem{display:flex;justify-content:space-between;align-items:center;background:#ffffff;border:1px solid var(--line2);border-radius:16px;padding:12px 15px;margin-bottom:10px;gap:10px;box-shadow:0 2px 14px rgba(90,159,212,.05),0 1px 2px rgba(0,0,0,.02)}
.mem .mn{font-weight:700;font-size:14px;color:var(--ink)}
.mem .md{font-size:11px;color:var(--sub);margin-top:2px}
.mem .mtags{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.mem .mtags .chip{font-size:11px;padding:3px 9px;background:var(--brand-soft);color:var(--brand)}
.search{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:20px;font-size:14px;background:#fff;margin-bottom:13px;box-sizing:border-box;box-shadow:0 2px 8px rgba(90,159,212,.06)}
/* admin table */
.adm-top{display:flex;gap:8px;margin-bottom:13px;flex-wrap:wrap}
.stat{background:#ffffff;border:1px solid var(--line2);border-radius:18px;padding:12px 16px;flex:1;text-align:center;box-shadow:0 2px 14px rgba(90,159,212,.05),0 1px 2px rgba(0,0,0,.02)}
.stat .num{font-size:22px;font-weight:700;color:var(--brand)}
.stat .lb{font-size:11px;color:var(--sub)}
.tbl-wrap{overflow-x:auto;background:#ffffff;border:1px solid var(--line);border-radius:18px;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;font-size:12px;white-space:nowrap}
th,td{border:1px solid var(--line);padding:7px 9px;text-align:left}

tr:nth-child(even) td{background:#f7fafd}

.mini{font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid var(--line);cursor:pointer;background:#fff}
.mini.del{color:var(--red);border-color:#fecaca}
/* modal */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:end;justify-content:center;z-index:60}
.sheet{background:#fff;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:20px}
.sheet h3{font-size:17px;margin-bottom:14px}
.sheet .grpttl{font-size:12px;color:var(--brand);font-weight:700;margin:14px 0 6px}
/* tabbar · 林芝晴日统一线性图标 */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--sun-surface);border-top:var(--sun-border-thin);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom);box-shadow:none}
.tab{flex:1;text-align:center;padding:8px 0 7px;font-size:11px;color:var(--sun-muted);cursor:pointer;transition:color .2s}
.tab.on{color:var(--sun-blue)}
.tab .ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 1px;line-height:1}
.tab .ic svg{width:24px;height:24px;display:block;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.empty-note{text-align:center;color:#94a3b8;font-size:13px;padding:30px}
.hint{font-size:12px;color:var(--sub);background:#fffef8;border:1px solid #f5e6c8;padding:10px 14px;border-radius:14px;margin-bottom:13px}

.tip-body{font-size:13px;color:#374151;line-height:1.7}
.tip-p{display:flex;gap:8px;padding:5px 0}
.tip-bullet{color:var(--brand);flex-shrink:0;font-weight:700;margin-top:1px}
.tip-sub{font-size:13px;color:var(--purple);font-weight:700;margin:12px 0 4px}
.tip-cat{font-size:12px;color:var(--purple);font-weight:700;margin:10px 0 4px}
.tip-item{padding:8px 0;border-bottom:1px solid var(--line2)}
.tip-item:last-child{border-bottom:none}
.ti-name{font-size:13px;font-weight:600;color:var(--ink)}
.ti-detail{font-size:12px;color:var(--sub);margin-top:3px}
/* schedule overview + day tabs */
.ov{background:linear-gradient(135deg,#e8f3fc,#ffffff)}
.ovh{font-weight:700;margin-bottom:8px;font-size:14px;color:var(--brand)}
.ovr{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid #eef2f7;align-items:center}
.ovr:last-child{border-bottom:none}
.ovd{font-weight:700;color:#fff;flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:12px}
.ovrt{flex:1;font-size:13px;color:var(--ink)}
.ovk{font-size:11px;color:var(--sub);flex-shrink:0;background:var(--brand-soft);padding:2px 8px;border-radius:10px;white-space:nowrap}
.daytabs{display:flex;gap:6px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch}
.dtab{flex:1;min-width:60px;text-align:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px 4px;cursor:pointer;flex-shrink:0;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dtab.on{background:linear-gradient(135deg,#5a9fd4,#7ab8e2);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(90,159,212,.28)}
.dtab .dw{font-weight:700;font-size:14px}
.dtab .dd{font-size:10px;opacity:.8;margin-top:2px}
.sec-h{font-size:18px;font-weight:700;margin:20px 0 12px;color:var(--ink);display:flex;align-items:center;gap:6px}
.sec-div{height:1px;background:var(--line);margin:22px 0 2px}
/* ===================== 全局轻量旅行标题带 ===================== */
.travel-hd{position:relative;top:auto;height:118px;padding:18px;display:flex;align-items:flex-start;justify-content:space-between;overflow:hidden;background:#378add;box-shadow:none}
.travel-header-copy,.travel-actions{position:relative;z-index:1}.travel-header-copy{min-width:0;display:flex;flex-direction:column;gap:4px}.travel-hd .t{font-size:19px;font-weight:700;letter-spacing:.2px}.travel-subtitle{font-size:12px;color:rgba(255,255,255,.82);line-height:1.35}.travel-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}.travel-hd .sw{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.38);padding:5px 9px;font-size:12px}.header-sync{border:1px solid rgba(255,255,255,.65);border-radius:999px;background:#fff;color:#378add;padding:5px 10px;font:inherit;font-size:12px;font-weight:700;cursor:pointer}.travel-hills{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:68px;pointer-events:none}.travel-page{position:relative;z-index:21;margin-top:-24px;padding:0 18px 22px;background:transparent}
/* 分组：林芝晴日 · 同行伙伴名册 */
.group-page .group-tabs{display:flex;gap:8px;overflow-x:auto;margin:0 -2px 16px;padding:2px;-webkit-overflow-scrolling:touch}.group-tab{min-width:92px;padding:10px 11px;border:var(--sun-border-thin);border-radius:14px;background:var(--sun-surface);color:var(--sun-sub);font-size:12px;text-align:center;cursor:pointer;flex-shrink:0}.group-tab strong{display:block;font-size:14px;color:var(--sun-text);line-height:1.25}.group-tab span{display:block;margin-top:2px;font-size:11px}.group-page.group-team .group-tab.on{background:var(--sun-purple);border-color:var(--sun-purple);color:#fff}.group-page.group-vehicle .group-tab.on{background:var(--sun-blue);border-color:var(--sun-blue);color:#fff}.group-tab.on strong{color:#fff}.group-page .grp{border:var(--sun-border-thin);border-radius:var(--sun-radius-card);padding:16px;margin-bottom:14px;box-shadow:none;background:var(--sun-surface)}.group-page .grp .gh{font-size:15px;color:var(--sun-text);margin-bottom:10px}.group-page .grp .m{background:var(--sun-purple-soft);color:#6651bd;padding:5px 10px;font-size:12px}.group-page .grp .m.me{background:var(--sun-purple);color:#fff}.group-page.group-vehicle .grp .m{background:var(--sun-blue-soft);color:var(--sun-blue-deep)}.group-page.group-vehicle .grp .m.me{background:var(--sun-blue);color:#fff}.group-page .mini{border-radius:999px;border:var(--sun-border-thin);color:var(--sun-sub)}.group-page .mini.del{color:#a84970;border-color:#f8d5e1}.group-dim-actions{display:flex;gap:8px;margin:0 0 12px}.group-page .btn.ghost{border:var(--sun-border-thin);border-radius:20px;background:var(--sun-surface);color:var(--sun-blue-deep)}
/* 资讯：林芝晴日 · 旅途提示卡 */
.info-page .info-tabs{display:flex;gap:8px;margin:0 0 16px}.info-tab{flex:1;padding:10px 12px;border:var(--sun-border-thin);border-radius:14px;background:var(--sun-surface);color:var(--sun-sub);font-size:13px;text-align:center;cursor:pointer}.info-tab small{font-size:11px}.info-tab.on{background:var(--sun-blue);border-color:var(--sun-blue);color:#fff}.info-page .nt,.info-page .card{border:var(--sun-border-thin);border-radius:var(--sun-radius-card);box-shadow:none;background:var(--sun-surface)}.info-page .nt{padding:16px;margin-bottom:14px}.info-page .card{padding:16px;margin-bottom:14px}.info-page .nt .th,.info-page .card h3{font-size:15px;color:var(--sun-text)}.info-page .nt .ct,.info-page .tip-body{color:var(--sun-sub)}.info-page .nt .mt{color:var(--sun-muted)}.info-page .badge-u{background:var(--sun-blue);border-radius:999px;padding:3px 8px}.info-page .hint{background:var(--sun-green-soft);border-color:#cfe9c9;color:#427c3e}.info-page .tip-sub,.info-page .tip-cat{color:#427c3e}.info-page .tip-bullet{color:var(--sun-green)}.info-page .tip-item{border-color:var(--sun-border)}.info-page .ti-name{color:var(--sun-text)}.info-page .ti-detail{color:var(--sun-sub)}.info-page .mini{border-radius:999px;border:var(--sun-border-thin);color:var(--sun-sub)}.info-page .mini.del{color:#a84970;border-color:#f8d5e1}.info-page>.btn{background:var(--sun-blue);border-radius:20px;box-shadow:none}
/* 组织者：旅行工作台 */
.admin-page .admin-summary{display:flex;gap:12px;margin-bottom:16px}.admin-page .stat{min-width:112px;flex:0 0 112px;background:#fff;border:.5px solid #e0e0e0;border-radius:16px;padding:14px 16px;box-shadow:none;text-align:left}.admin-page .stat .num{font-size:24px;color:#378add}.admin-page .stat .lb{font-size:11px;color:#888;margin-top:2px}.admin-section-title{font-size:15px;color:#243b53;font-weight:700;margin:0 0 10px}.admin-toolbar{display:flex;gap:8px;margin-bottom:12px}.admin-toolbar .btn{margin:0;width:auto;padding:9px 14px;border-radius:12px;background:#378add;box-shadow:none}.admin-page .tbl-wrap{border:.5px solid #e0e0e0;border-radius:16px;box-shadow:none}.admin-page th{background:#e6f1fb;color:#185fa5}.admin-page tr:nth-child(even) td,.admin-page tr:nth-child(even) td.name-col{background:#fafcff}
/* 分组、资讯页专属浅青柠绿头图 */
#app.group-shell .group-hd,#app.info-shell .info-hd{height:132px;background:var(--sun-atmosphere);color:var(--sun-text);padding:18px}.group-hd .t,.info-hd .t{font-size:19px;color:var(--sun-text)}.group-hd .travel-subtitle,.info-hd .travel-subtitle{font-size:12px;color:var(--sun-sub)}.group-hd .sw,.info-hd .sw{background:var(--sun-surface);border:var(--sun-border-thin);color:var(--sun-purple);padding:6px 10px}.group-hd .travel-hills,.info-hd .travel-hills{height:72px}.group-hd .travel-actions,.info-hd .travel-actions{align-items:flex-start}
/* 行程页专属浅青柠绿头图：不影响其他页面 */
.travel-hd.schedule-hd{height:194px;background:#e9f9d9;color:#27352e;padding:18px}.schedule-hd .travel-header-copy{gap:5px}.schedule-hd .t{font-size:12px;font-weight:500;color:#5c6f63}.schedule-hd .travel-subtitle{font-size:22px;line-height:1.25;font-weight:700;color:#27352e}.schedule-hd .schedule-header-meta{font-size:12px;line-height:1.4;color:#66766c}.schedule-hd .sw{background:#fff;border-color:#fff;color:#6651bd;padding:6px 10px}.schedule-hd .travel-hills{height:84px}.schedule-hd .header-sync{border-color:#fff;color:#24789d}.schedule-hd .travel-actions{align-items:flex-start}
/* ===================== 我的页 · 林芝晴日资料册 ===================== */
#app .my-hd{position:relative;top:auto;height:184px;padding:22px 18px;background:var(--sun-atmosphere);color:var(--sun-text);align-items:flex-start;overflow:hidden;box-shadow:none}
.my-hd .t,.my-hd .sw{position:relative;z-index:1}.my-hd .t{font-size:18px;font-weight:700;letter-spacing:.2px;color:var(--sun-text)}.my-hd .sw{background:var(--sun-surface);border:var(--sun-border-thin);color:var(--sun-purple);padding:6px 10px;font-size:12px}
.my-hills{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:112px;pointer-events:none}.my-page{position:relative;z-index:21;margin-top:-70px;padding:0 18px 22px;background:transparent}.profile-home{padding-bottom:4px}
.profile-card{position:relative;background:var(--sun-surface);border:var(--sun-border-thin);border-radius:var(--sun-radius-card);padding:18px 16px;margin-bottom:22px;display:flex;align-items:center;gap:13px}.profile-avatar{width:50px;height:50px;flex:0 0 50px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--sun-blue-soft);color:var(--sun-blue-deep);font-size:19px;font-weight:700}
.profile-copy{min-width:0;flex:1}.profile-name{font-size:20px;line-height:1.2;color:var(--sun-text);font-weight:700;letter-spacing:.1px}.profile-dept{margin-top:4px;color:var(--sun-sub);font-size:12px;line-height:1.35}.profile-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.profile-chip{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700;line-height:1.2}.profile-chip.vehicle{background:var(--sun-blue-soft);color:var(--sun-blue-deep)}.profile-chip.game{background:var(--sun-purple-soft);color:#6651bd}.profile-chip.default{background:var(--sun-pink-soft);color:#a84970}
.profile-sync{position:absolute;right:12px;top:12px;width:auto;height:auto;padding:4px 8px;border-radius:999px;background:var(--sun-surface);border:var(--sun-border-thin);color:var(--sun-blue-deep);font-size:11px;box-shadow:none}.profile-section-title{font-size:15px;font-weight:700;color:var(--sun-text);margin:0 0 10px}
.profile-module{position:relative;overflow:hidden;background:var(--sun-surface);border:var(--sun-border-thin);border-radius:var(--sun-radius-card);margin-bottom:16px;padding:20px 16px 10px}.profile-module::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;border-radius:16px 16px 0 0;background:var(--sun-blue)}.profile-module.stay::before{background:var(--sun-pink)}.profile-module-title{font-size:15px;line-height:1.3;font-weight:700;color:var(--sun-text);margin-bottom:6px}
.profile-module .row{display:block;padding:11px 0;border-color:var(--sun-border)}.profile-module .row .k{display:block;color:var(--sun-muted);font-size:11px;font-weight:400;margin-bottom:4px}.profile-module .row .v{display:block;text-align:left;color:var(--sun-sub);font-size:13px;font-weight:400;line-height:1.6;word-break:break-word}.profile-module .row .v.empty{color:var(--sun-muted)}.profile-module .flight-prefix{display:block;color:var(--sun-muted);font-size:11px;margin:0 0 2px}.profile-module .flight-seg{font-size:13px;line-height:1.6}.profile-module .hotel-mate{font-size:12px;color:var(--sun-sub);margin-top:4px}.profile-edit{margin-top:2px;border-radius:20px;background:var(--sun-blue);box-shadow:none}
/* ===================== 天蓝童话 · 启动页动态背景 ===================== */
.bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;background:linear-gradient(175deg,#4a8ac4 0%,#6aaddd 35%,#8fc5ea 60%,#b8ddf0 100%)}
/* 远山层（三层递进，品牌蓝色阶） */
.bg-mtn{position:absolute;bottom:0;left:0;width:100%;height:46%}
/* 光晕（青蓝+微琥珀暖调） */
.bg-glow{position:absolute;top:-8%;right:-12%;width:58%;height:50%;background:radial-gradient(circle,rgba(255,255,255,.35) 0%,rgba(255,255,255,0) 70%);opacity:.9;animation:glowBreath 8s ease-in-out infinite}
.bg-glow2{position:absolute;top:20%;left:-8%;width:44%;height:36%;background:radial-gradient(circle,rgba(232,106,106,.15) 0%,rgba(232,106,106,0) 70%);opacity:.7;animation:glowBreath2 10s ease-in-out infinite}
/* 流云（白色，柔和飘动） */
.bg-cloud{position:absolute;background:rgba(255,255,255,.35);border-radius:50%;filter:blur(3px)}
.bg-cloud::before,.bg-cloud::after{content:"";position:absolute;background:inherit;border-radius:50%}
.bg-cloud.c1{width:100px;height:32px;top:10%;left:-30%;animation:drift 52s linear infinite}
.bg-cloud.c1::before{width:52px;height:52px;top:-22px;left:16px}
.bg-cloud.c1::after{width:38px;height:38px;top:-14px:left:52px}
.bg-cloud.c2{width:72px;height:24px;top:22%;left:-30%;animation:drift 68s linear infinite;animation-delay:-26s;opacity:.14}
.bg-cloud.c2::before{width:38px;height:38px;top:-16px;left:12px}
.bg-cloud.c2::after{width:28px;height:28px;top:-10px;left:38px}
.bg-cloud.c3{width:120px;height:36px;top:6%;left:-30%;animation:drift 86s linear infinite;animation-delay:-48s;opacity:.18}
.bg-cloud.c3::before{width:58px;height:58px;top:-26px;left:20px}
.bg-cloud.c3::after{width:42px;height:42px;top:-16px;left:60px}
/* 底部流动水波纹 */
.bg-river{position:absolute;bottom:0;left:0;width:100%;height:15%;background:linear-gradient(180deg,rgba(138,173,221,.3),rgba(90,159,212,.18))}
.bg-wave{position:absolute;bottom:0;left:0;width:200%;height:100%}
/* 浮动光点（替代花瓣，青白几何感） */
#particles{position:absolute;inset:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;background:rgba(255,255,255,.45);animation:floatUp linear infinite}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(148vw)}}
@keyframes glowBreath{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.95;transform:scale(1.06)}}
@keyframes glowBreath2{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.75;transform:scale(1.05)}}
@keyframes floatUp{0%{transform:translateY(106vh) translateX(0) scale(.5);opacity:0}15%{opacity:.6}85%{opacity:.4}100%{transform:translateY(-6vh) translateX(30px) scale(1);opacity:0}}
@keyframes waveFlow{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@media (prefers-reduced-motion: reduce){
  .bg-glow,.bg-glow2,.bg-cloud,.particle{animation:none}
  .bg-cloud,.particle{display:none}
}
/* ===================== 模块撞色（首页卡片 accent） ===================== */
.card.accent-green{border-left:4px solid var(--ok)}
.card.accent-green .mod-tag{background:var(--okbg);color:var(--ok)}
.card.accent-purple{border-left:4px solid var(--purple)}
.card.accent-purple .mod-tag{background:var(--purplebg);color:var(--purple)}
.card.accent-coral{border-left:4px solid var(--coral)}
.card.accent-coral .mod-tag{background:var(--coralbg);color:var(--coral)}
.card.accent-blue{border-left:4px solid var(--brand)}
.card.accent-blue .mod-tag{background:var(--brand-soft);color:var(--brand)}
/* 进入小程序后：天蓝童话静态渐变背景 */
.entered .hd{background:linear-gradient(135deg,#5a9fd4,#7ab8e2)}
/* 行程页必须维持参考图的浅青柠绿，不受通用蓝色顶栏覆盖 */
#app.schedule-shell .schedule-hd{background:#e9f9d9}
#app.schedule-shell .page::before,#app.schedule-shell .page::after{display:none}

/* ===================== 童话装饰元素（星星/圆点/云朵） ===================== */
.page::before{content:"✦";position:absolute;top:12px;right:20px;font-size:18px;color:rgba(90,159,212,.15);animation:twinkle 4s ease-in-out infinite;pointer-events:none;z-index:0}
.page::after{content:"·";position:absolute;top:60px;left:14px;font-size:28px;color:rgba(232,106,106,.1);animation:twinkle 5s ease-in-out infinite 1s;pointer-events:none;z-index:0}
@keyframes twinkle{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.2)}}

<script>
/* ============== 配置（由生成器注入，每个活动不同） ============== */

const EVENT_SUBTITLE = "11.08—11.11";

绒或羽绒+冲锋衣或防风外套），\n早晚：至少三件衣服（打底长袖+抓绒或羽绒+冲锋衣或防风外套）。\n个别地方海拔高温差更大，建议多带一件保暖衣物备用（羽绒服，毛衣之类），需按照约-5℃的极限温度准备。\n*其他换洗衣物看个人情况自备。"}]}, {"title": "个人物品建议", "type": "items", "groups": [{"name": "证件", "items": [{"name": "证件☆☆☆☆☆", "detail": "身份证"}]}, {"name": "日用", "items": [{"name": "保温杯☆☆☆☆☆", "detail": "常饮温开水，防止肠胃不适，有效预防高原反应，随身携带"}, {"name": "双肩背包☆☆☆☆☆", "detail": "随身携带，放置重要物品及应急物品，冲锋衣/外套/保暖衣物（冷了穿、热了放包里）、雨具、保温杯、零食、身份证等"}, {"name": "个人洗漱用品☆☆", "detail": "一晚是酒店、两晚是民宿，民宿洗浴用品一般，介意根据个人需要自带。"}, {"name": "墨镜/墨镜夹片☆☆☆", "detail": "防烈日眩光，防紫外线，防风"}, {"name": "帽子☆☆☆☆☆", "detail": "防风、防晒、保暖，棒球帽、渔夫帽、面线帽均可"}, {"name": "雨伞☆☆☆", "detail": "高原天气多变，雨具需随身携带，工作人员也将统一准备雨衣。"}]}, {"name": "防护保养", "items": [{"name": "防晒霜☆☆☆☆☆", "detail": "spf50+"}, {"name": "润唇膏☆☆☆☆☆", "detail": "高原天气干燥，防止嘴唇干裂"}, {"name": "护肤品、面膜☆☆☆", "detail": "高原天气干燥，容易晒伤，根据个人情况携带护肤品"}]}, {"name": "衣物", "items": [{"name": "外套☆☆☆☆☆", "detail": "风衣/冲锋衣"}, {"name": "保暖层☆☆☆☆☆", "detail": "抓绒/毛衣/中度填充羽绒服"}, {"name": "鞋子", "detail": "运动鞋/徒步登山鞋均可，路面较为平坦，着舒适运动鞋、徒步登山鞋均可以；防水最佳"}]}, {"name": "药品", "items": [{"name": "个人药品☆☆☆☆☆", "detail": "随队有急救药箱和药品，其他药品根据个人需要自行携带"}]}, {"name": "其他", "items": [{"name": "根据个人需要☆☆☆", "detail": "相机、充电器、充电宝、手环或手表（随时测量血氧心跳等身体数据）等根据个人需要携带"}]}], "blocks": []}, {"title": "预防高反相关事项", "type": "blocks", "groups": [], "blocks": [{"kind": "subtitle", "subtitle": "预防高原反应", "text": "1.初到高原，当晚及第二天早一定不要洗头洗澡，不建议熬夜、饮酒等行为\n2.高原预防高原反应的几个关键点，注意不要剧烈运动，保证充足睡眠，做好保暖，带上水杯或保温杯尽可能多喝热水；\n3.保持良好心态，初上高原，容易有其中一种或者多种反应：头痛、头昏、恶心呕吐、心慌气短、脉搏增快、胸闷胸痛、失眠、食欲减退等，我们也会携带备用氧气瓶。一般休息一晚即可适应高原环境。出现不舒服的情况，一定要及时告知领队；\n4.高反常见的诱发原因：剧烈运动、淋雨吹风受凉、过度紧张、熬夜睡眠不足、初到高原洗头洗澡、初到高原喝酒等行为；\n5.多喝酥油茶、热水可以有效预防高原反应。"}, {"kind": "subtitle", "subtitle": "行前准备", "text": "1.尽量在临行一周科学的调整作息时间，保证好的身体状态；（如不确定自身情况，如高血压，心脏病等，可提前做个高原体检，以医生建议为准）\n2.若有明显心、肺、肾等不适，高血压三期以上、重感冒者，均不宜进入高海拔地区。\n3.出发前，注意身体，谨防感冒、发烧等情况出现。"}, {"kind": "subtitle", "subtitle": "适应期", "text": "1.保持愉悦的心情（有些高原反应也是由于过度紧张引起），保证充分的休息和睡眠；\n2.第一天不要洗澡或者洗头；\n3.应注意多饮热水，多吃水果，保证饮食营养均衡，避免暴饮暴食，第一天尽量避免喝酒；\n4.高原昼夜温差大，注意保暖防寒，防止出现感冒诱发其他高原反应，车上应有多备衣服，可以准备帽子避免冷5.风直接吹头；\n6.如有高原反应，可根据反应的强度，适当的采取辅助治疗，如葡萄糖水剂、高原安、芬必得，或者吸氧等；\n7.尽量避免剧烈的运动和活动，少跑、跳，多休息；\n8.如有不适，请及时向领队反馈"}]}, {"title": "自驾须知", "type": "blocks", "groups": [], "blocks": [{"kind": "subtitle", "subtitle": "车辆介绍", "text": "【坦克300】专为追求硬派越野和豪华驾驶体验的消费者设计。这款车型结合了复古的外观与现代科技，拥有较高的越野能力和舒适性，非常适合长途自驾活动。下面是一些在自驾活动中比较常用的功能：\n四驱系统：坦克300配备了分时四驱系统，允许驾驶员根据路况选择两驱或四驱模式。\n越野模式：车辆内置多种驾驶模式，如雪地、沙地、岩石爬行等，可根据不同的地形选择最佳驾驶模式。\n车身稳定系统：在复杂路况下，车身稳定系统能够帮助维持车辆稳定，减少打滑的风险。\n倒车影像与雷达：在狭窄的道路上停车或倒车时，这些功能可以帮助驾驶员更安全地操控车辆。\n多媒体系统：集成导航、蓝牙音频流、电话等功能，提供娱乐和信息，使长途驾驶更加舒适。\n座椅加热与通风：长途驾驶中，这些功能可以提供额外的舒适性，特别是在不同季节的变换中。"}, {"kind": "subtitle", "subtitle": "安全驾驶", "text": "遵守交规：严格遵守当地的交通法规，注意限速标志。\n驾驶技巧：坦克300具有较好的越野性能，但在崎岖路面仍需缓慢行驶，避免损伤车辆。\n高原驾驶：西藏地区海拔高，车辆动力会有所下降，驾驶时留心观察车辆表现。\n疲劳驾驶：避免长时间连续驾驶，每两小时至少休息一次。\n适应海拔：初入高原，给身体足够的时间适应，避免剧烈运动。\n症状监测：注意高原反应症状，如头痛、恶心，必要时寻求医疗帮助。"}]}, {"title": "旅行须知", "type": "blocks", "groups": [], "blocks": [{"kind": "subtitle", "subtitle": "民俗及注意事项", "text": "1.宗教信仰：西藏主要是藏传佛教的信仰中心，藏民非常虔诚，尊重他们的宗教活动和场所。在参观寺庙时，不要触摸佛像、经书，避免在寺内大声喧哗，尊重僧侣和信徒。\n2.经幡与玛尼堆：沿途可见的彩色经幡和玛尼堆是藏民祈福的方式，不要随意破坏或踩踏，它们被认为是神圣的。\n3.转经与绕行：转经筒和绕行寺庙、佛塔时必须顺时针方向，逆向被视为不敬。\n4.服饰礼仪：参观寺庙时，穿着应保守，避免短裤、短裙，部分场合可能要求不戴墨镜。\n5.拍照许可：拍照前尤其是拍摄藏民、僧侣或宗教仪式时，务必获得许可，尊重他人隐私。"}, {"kind": "subtitle", "subtitle": "饮食", "text": "西藏地区，以川菜口味居多，活动中的用餐都是根据多年经验，筛选出符合内地人口味、口碑较好的餐厅。如有过敏、忌口或少数民族禁忌请提前告知，我们将会提醒餐厅注意"}, {"kind": "subtitle", "subtitle": "温馨提示", "text": "1、飞机进藏：建议登机牌选择左侧靠窗，这样左侧的喜马拉雅山脉一览无余。飞机离开的时候建议登机牌选择右侧靠窗，这样右侧可以看到诸多雪山！（部分时候会遇到特殊情况，飞机飞行过程中就不让打开遮光板了，此条仅作参考）\n2、出行前兑换一些一元的纸币（沿途上简易厕所，或者遇到一些诵经乞讨的人需要，或者进入寺庙朝拜祈福，当地不收硬币）（一些发达城市已经不发行1元纸币难以兑换到，可以换一些5元或10元的纸币带着，随身也带几百块钱的现金，预防信号不好或应急用）\n3、西藏全境没有4G/5G网络覆盖，网速较慢，建议选择移动和电信号码，网络相对较好。（西藏移动支付也很方便）\n4、藏区旅游时切勿私自行走，以免与当地藏狗、牦牛等发生冲突，产生意外！\n5、在活动过程中，如果需要短暂离开团队，需要征询导游、领队的同意方便团友等待。\n6、请记住约好的集合时间和地点。如在团队徒步过程迷路。请在原地等待领队，勿擅自行走并拨打领队电话。"}]}, {"title": "领队联系方式", "type": "blocks", "groups": [], "blocks": [{"kind": "text", "text": "子迁 18617061181、大胜 18823448331"}]}], "overview": [{"day": "D1", "route": "米林机场—佛掌沙丘—派镇吞白村—达林村—索松村", "km": "105公里"}, {"day": "D2", "route": "索松村—尼洋河风光带—巴河镇—巴松措—新措", "km": "247公里"}, {"day": "D3", "route": "巴松措景区内", "km": "30公里"}, {"day": "D4", "route": "巴松措—林芝米林机场", "km": "168公里"}], "groupFields": ["车号", "游戏分组", "现场角色"]};

/* ============== 本地持久化（按活动隔离） ============== */
const LS_KEY = "tj_" + btoa(unescape(encodeURIComponent(EVENT_TITLE))).replace(/[^a-zA-Z0-9]/g,"").slice(0,18);
const DATA_VERSION = 3;
let state = JSON.parse(JSON.stringify(DATA));
// 分组维度改为可编辑（存 state），初始值取生成时的 GROUP_FIELDS
if(!state.groupFields) state.groupFields = (GROUP_FIELDS||[]).slice();
// _edited：本地改过/新增过的人(_id)，云端拉取时不被覆盖（解决"组织者保存后被自动同步冲掉"）
if(!state._edited) state._edited = {};
try{
  const saved = localStorage.getItem(LS_KEY);
  if(saved){
    const s = JSON.parse(saved);
    if(s.v === DATA_VERSION){
      if(s.people) state.people = s.people;
      if(s.schedule) state.schedule = s.schedule;
      if(s.notices) state.notices = s.notices;
      if(s.tips) state.tips = s.tips;
      if(s.overview) state.overview = s.overview;
      if(s.groupFields) state.groupFields = s.groupFields;
      if(s._edited) state._edited = s._edited;
    }
  }
}catch(e){}
// 当前分组维度列表（组织者可增删改）
function GF(){ return (state.groupFields && state.groupFields.length!=null) ? state.groupFields : (GROUP_FIELDS||[]); }
function persist(){localStorage.setItem(LS_KEY, JSON.stringify({v:DATA_VERSION, people:state.people, schedule:state.schedule, notices:state.notices, tips:state.tips, overview:state.overview, groupFields:state.groupFields, _edited:state._edited}));}
// 标记某人为"本地已改"，拉取云端时不覆盖
function markEdited(id){ if(!id) return; if(!state._edited) state._edited={}; state._edited[id]=true; }
function clearEdited(id){ if(!state._edited) return; if(id) delete state._edited[id]; else state._edited={}; }

/* ============== 口令（默认可配置 + 应用内修改） ============== */
const PWD_KEY = LS_KEY + "_pwd";
let ADMIN_PWD = (ADMIN_PWD_DEFAULT || "8888");
try{ const sp = localStorage.getItem(PWD_KEY); if(sp) ADMIN_PWD = sp; }catch(e){}

/* ============== 通用工具 ============== */
let ctx = {role:null, me:null, tab:"home", schedDay:0, groupIdx:0};
const $=(s)=>document.querySelector(s);
const app=$("#app");
function maskPhone(p){return p&&p.length>=7 ? p.slice(0,3)+"****"+p.slice(-4) : (p||"");}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function displayName(p){ return (p&&p[NAME_FIELD]) || (p&&p["身份证姓名"]) || (p&&p["中文名"]) || (state.fields&&state.fields[0]?p[state.fields[0].key]:"") || "—"; }
function subLine(p){ return (p&&SUB_FIELD&&p[SUB_FIELD]) ? p[SUB_FIELD] : ""; }
function findMe(){return state.people.find(p=>p._id===ctx.me)||state.people[0];}
function fieldByKey(k){return state.fields.find(f=>f.key===k);}
function valOf(p,k){return (p&&p[k]!=null)?String(p[k]):"";}

  app.style.background='var(--bg)';
  app.classList.remove('entered','schedule-shell');
  const bg=document.querySelector('.bg-layer'); if(bg) bg.style.display='none';
  app.innerHTML = `

    <main class="home-panel">

        <span class="identity-icon" aria-hidden="true"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18c2-5 5-7 8-7s6 2 8 7"/><path d="M8 8.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/><path d="M16 8.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/></svg></span>

        <span class="identity-icon" aria-hidden="true"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 5h10v15H6V7"/><path d="M8 5V3h6v2"/><path d="M9 10h6M9 14h6"/><path d="m4 12 1.5 1.5L8 11"/></svg></span>

  let cards=MEMBER_MODULE_ORDER.filter(m=>modules[m]).map(m=>{

  /* ── 特殊排版：机酒航班 ── */
  function renderFlightRow(label, raw){
    const t=String(raw||"").trim();
    if(!t) return `<div class="row"><span class="k">${esc(label)}</span><span class="v empty">待定</span></div>`;
    const parts=t.split(/\s*--\s*/);

    if(!body) return `<div class="row"><span class="k">${esc(label)}</span><span class="v">${esc(t)}</span></div>`;
    const segs=body.split(/\s*\+\s*/);
    const flightHtml=segs.map(s=>`<span class="flight-seg">${esc(s.trim())}</span>`).join("");
    return `<div class="row row-flight"><span class="k">${esc(label)}</span><span class="v"><span class="flight-prefix">${esc(prefix)}</span> ${flightHtml}</span></div>`;
  }

  /* ── 住宿：保留原始字段全文，不再清洗日期、房号或室友信息 ── */
  function renderHotelRow(label, rawVal){
    const v=String(rawVal||"").trim();
    if(!v) return `<div class="row row-hotel"><span class="k">${esc(label)}</span><span class="v empty">待定</span></div>`;
    return `<div class="row row-hotel"><span class="k">${esc(label)}</span><span class="v">${esc(v)}</span></div>`;
  }

    const rows=modules[m].filter(f=>!(m==="机酒预订"&&HIDE_KEYS.includes(f.key))).map(f=>{
      let v=valOf(me,f.key);
      if(f.sensitive){ v = (f.key.indexOf("手机")>=0||f.key.indexOf("电话")>=0)?maskPhone(v):(v?"已加密·仅组织者可见":""); }
      const lock = f.editor==="admin" ? `<span class="lockicon">只读</span>` : "";
      const sens = f.sensitive ? `<span class="sens-badge">脱敏</span>`:"";

      /* 特殊字段走专用排版 */
      if(f.key==="去程航班"||f.key==="返程航班") return renderFlightRow(f.label,v);
      if(m==="住宿安排") return renderHotelRow(f.label,v);

      const shown = v ? esc(v) : "待定";
      return `<div class="row"><span class="k">${esc(f.label)}${lock}${sens}</span><span class="v ${v?'':'empty'}">${shown}</span></div>`;
    }).join("");
    return `<section class="profile-module ${MODULE_STYLE[m]||'flight'}"><h3 class="profile-module-title">${esc(m)}</h3>${rows}</section>`;
  }).join("");

  const chips=(CHIP_FIELDS||[]).filter(k=>valOf(me,k)).map(k=>{
    const cls=k==="车号"?"vehicle":(k==="游戏分组"?"game":"default");
    return `<span class="profile-chip ${cls}">${esc(k)} · ${esc(valOf(me,k))}</span>`;
  }).join("");
  const name=displayName(me);
  const avatar=(name||"同").trim().slice(0,1);

  return `<div class="profile-home">

      ${SYNC_ENABLED?`<button class="profile-sync" onclick="manualResync()" title="同步最新数据">同步</button>`:""}

    </section>

  </div>`;
}

function saveEdit(){

/* ============== 参与者自推：只回传自己那条记录（双向同步） ============== */
async function pushMyRecord(){
  if(!SYNC_ENABLED) return;
  const me=findMe();
  if(!me || !me._id) return;
  // 仅推送「成员可自行编辑」的字段，避免越权改分组/后台字段
  const keys=(state.fields||[]).filter(f=>f.editor==="member").map(f=>f.key);
  const patch={_id:me._id};
  keys.forEach(k=>{ if(me[k]!==undefined) patch[k]=me[k]; });
  async function attempt(){
    const getR=await fetch(SYNC_API,{headers:{Authorization:"Bearer "+GITHUB_SYNC_TOKEN,Accept:"application/vnd.github+json"}});
    if(!getR.ok) throw new Error("读取云端失败 "+getR.status);
    const getD=await getR.json();
    const cloud=decodeBase64Json(getD.content);
    const people=(cloud.people||[]).slice();
    const idx=people.findIndex(p=>p._id===me._id);
    if(idx>=0){ keys.forEach(k=>{ people[idx][k]=patch[k]; }); }
    else { people.push(patch); }
    const payload=Object.assign({},cloud,{people:people,_ts:Date.now()});
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const body={message:"update: "+me._id+" @ "+new Date().toLocaleString('zh-CN'),content:content,branch:SYNC_BRANCH,sha:getD.sha};
    const wr=await fetch(SYNC_API,{method:"PUT",headers:{Authorization:"Bearer "+GITHUB_SYNC_TOKEN,"Accept":"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!wr.ok){ const t=await wr.text().catch(()=>""); throw new Error("上传失败 "+wr.status+": "+t.slice(0,160)); }
  }
  for(let i=0;i<3;i++){
    try{ await attempt(); clearEdited(me._id); toast("✅ 你的修改已同步给组织者"); return; }
    catch(e){ if(/409/.test(e.message) && i<2) continue; toast("同步失败，可稍后点「重新同步」重试"); return; }
  }
}

function _tipBody(t){
  let body="";
  if(t.groups&&t.groups.length){
    body=t.groups.map(g=>`<div class="tip-cat">${esc(g.name)}</div>`+
      (g.items||[]).map(it=>`<div class="tip-item"><div class="ti-name">${esc(it.name.replace(/[\★\☆\*]+/g,''))}</div>${it.detail?`<div class="ti-detail">${esc(it.detail)}</div>`:''}</div>`).join("")).join("");
  } else if(t.blocks&&t.blocks.length){
    body=t.blocks.map(b=> b.kind==="subtitle"
      ? `<div class="tip-sub">${esc(b.subtitle)}</div><div class="tip-body">${_renderTipText(b.text)}</div>`
      : `<div class="tip-body">${_renderTipText(b.text)}</div>`).join("");
  }
  return body;
}
function _renderTipText(text){
  if(!text) return '';
  // 按换行分段，每段前加圆点；空行跳过；清理段首 * 和数字编号
  return text.split('\n').filter(s=>s.trim()).map(s=>{
    let t = s.trim();
    t = t.replace(/^[\*·\s]+/, '').replace(/^[①②③④⑤⑥⑦⑧⑨⑩]+\s*/,'').replace(/^\(?[（(]?\d+[）)．.、:\s]+/, '');
    return `<div class="tip-p"><span class="tip-bullet">•</span>${esc(t)}</div>`;
  }).join('');
}

let _tipBuf=null, _tipIdx=-1;
function delTip(i){confirmSheet('确定删除该贴士「'+(state.tips[i]?state.tips[i].title:'')+'」？',()=>{state.tips.splice(i,1);persist();render();});}

function editTip(i){_tipIdx=i;_tipBuf=JSON.parse(JSON.stringify(state.tips[i]));
  if(!_tipBuf.type)_tipBuf.type=(_tipBuf.groups&&_tipBuf.groups.length)?'items':((_tipBuf.blocks&&_tipBuf.blocks.length)?'blocks':'items');
  if(_tipBuf.type==='items'&&!_tipBuf.groups)_tipBuf.groups=[];
  if(_tipBuf.type==='blocks'&&!_tipBuf.blocks)_tipBuf.blocks=[];
  _renderTipSheet();}
function _syncTipBuf(){
  _tipBuf.title=document.querySelector('[data-tt="title"]').value;
  if(_tipBuf.type==='items'){
    _tipBuf.groups=[...document.querySelectorAll('.tip-cat-row')].map(cr=>{
      const name=cr.querySelector('[data-cn]').value;
      const items=[...cr.querySelectorAll('.tip-item-row')].map(ir=>({name:ir.querySelector('[data-in]').value,detail:ir.querySelector('[data-id]').value}));
      return {name,items};
    });
  } else {
    _tipBuf.blocks=[...document.querySelectorAll('.tip-block-row')].map(br=>{
      const kind=br.dataset.kind;
      if(kind==='subtitle')return{kind,subtitle:br.querySelector('[data-bs]').value,text:br.querySelector('[data-bt]').value};
      return{kind:'text',text:br.querySelector('[data-bt]').value};
    });
  }
}
function _renderTipSheet(){
  const t=_tipBuf;
  let inner=`<h3>编辑贴士</h3><div class="f-item"><label>标题</label><input data-tt="title" value="${esc(t.title)}"></div>`;
  if(t.type==='items'){
    inner+=`<div class="hint">分类与条目均可增删改</div>`;
    t.groups.forEach((g,gi)=>{
      inner+=`<div class="tip-cat-row" style="border:1px solid var(--line);border-radius:10px;padding:8px;margin:8px 0">

/* ============== 行程 ============== */
function transIcon(trans){
  if(!trans) return '';
  if(trans.includes('飞机')) return '✈️';
  if(trans.includes('自驾')) return '🚗';
  if(trans.includes('徒步')) return '🥾';
  return '🚗'; // 默认
}
function compactScheduleDate(date){
  const s=String(date||"");
  const m=s.match(/(\d{1,2})月(\d{1,2})日?/);
  return m ? String(m[1]).padStart(2,"0")+"."+String(m[2]).padStart(2,"0") : s;
}
function scheduleStory(day){
  const copy={D1:"初到林芝",D2:"深入山林",D3:"漫游巴松措",D4:"满载返程"};
  return copy[day.week] || "今日行程";
}
function scheduleRoute(day){
  const found=(state.overview||[]).find(o=>o.day===day.week)||{};
  return {route:found.route||day.title||"路线待定",km:found.km||""};
}
function scheduleEventType(it){
  const text=((it.act||"")+" "+(it.trans||"")).toLowerCase();
  if((it.trans||"") || /航班|机场|起飞|抵达|自驾|车辆|车程|接送/.test(text)) return "transport";
  if(/午餐|晚餐|早餐|用餐|吃饭|茶/.test(text)) return "meal";
  if(/入住|酒店|民宿|住宿|休息/.test(text)) return "stay";
  if(/集合|接机|合影|签到|出发|团建/.test(text)) return "gathering";
  return "activity";
}
function scheduleEventLabel(kind){return {transport:"交通",gathering:"集合",meal:"用餐",stay:"住宿",activity:"活动"}[kind]||"活动";}
function scheduleTimelineItem(it,index,isAdmin){
  const kind=scheduleEventType(it);
  const note=[it.end?"至 "+it.end:"",it.trans||""].filter(Boolean).join(" · ");
  const controls=isAdmin?`<div class="timeline-admin-actions"><button class="mini" onclick="editSchedItem(${ctx.schedDay},${index})">改</button><button class="mini del" onclick="delSchedItem(${ctx.schedDay},${index})">删</button></div>`:"";
  return `<article class="timeline-item kind-${kind}">
    <time class="timeline-time">${esc(it.start||"—")}</time>
    <div class="timeline-rail" aria-hidden="true"><span class="timeline-dot"></span></div>
    <div class="timeline-card"><div class="timeline-event">${esc(it.act||"待定行程")}</div>
      <div class="timeline-foot"><span class="timeline-note">${esc(note||"当日行程")}</span><span class="event-tag ${kind}">${scheduleEventLabel(kind)}</span></div>${controls}
    </div>
  </article>`;
}
function scheduleTabs(){
  return `<div class="sched-tabs" aria-label="行程日期切换">`+state.schedule.map((d,i)=>
    `<button class="sched-tab ${ctx.schedDay===i?'on':''}" onclick="goSchedDay(${i})"><span class="sched-day">${esc(d.week)}</span><span class="sched-date">${esc(compactScheduleDate(d.date))}</span></button>`).join("")+`</div>`;
}
function goSchedDay(i){ctx.schedDay=i;render();}
function toggleRouteOverview(){ctx.routeOverview=!ctx.routeOverview;render();}
function scheduleRouteDrawer(){
  const ov=state.overview||[];
  if(!ctx.routeOverview || !ov.length) return "";
  return `<section class="route-drawer" aria-label="全程路线"> <div class="route-drawer-title">D1—D4 全程路线</div>`+
    ov.map(o=>`<div class="route-stop"><span class="route-stop-day">${esc(o.day)}</span><span class="route-stop-main">${esc(o.route)}</span><span class="route-stop-km">${esc(o.km)}</span></div>`).join("")+`</section>`;
}
function scheduleView(){
  const isAdmin=ctx.role==="admin";
  if(!state.schedule || !state.schedule.length){
    return `<div class="schedule-empty">暂无行程数据<br><span style="font-size:12px">组织者可在数据后台补充行程。</span></div>`;
  }
  if(ctx.schedDay==null||ctx.schedDay>=state.schedule.length)ctx.schedDay=0;
  const d=state.schedule[ctx.schedDay];
  if(!d || !d.items) return `<div class="schedule-empty">行程数据异常</div>`;
  const r=scheduleRoute(d);
  const routeBtn=(state.overview||[]).length?`<button class="route-toggle" onclick="toggleRouteOverview()">${ctx.routeOverview?'收起路线':'查看路线'}</button>`:"";
  const routeScene=`<svg class="route-mountains" viewBox="0 0 394 160" preserveAspectRatio="none" aria-hidden="true"><circle cx="318" cy="34" r="19" fill="#ffe28a"/><path d="M0 116 L48 68 L94 99 L145 48 L198 98 L250 61 L304 101 L350 70 L394 104 L394 160 L0 160 Z" fill="#b9d59f"/><path d="M0 133 L50 96 L101 124 L156 78 L209 126 L262 88 L315 122 L363 98 L394 117 L394 160 L0 160 Z" fill="#80c977"/><path d="M0 145 C49 132 89 148 132 137 C184 124 223 150 268 138 C310 127 352 143 394 132 L394 160 L0 160 Z" fill="#f1a06f"/></svg>`;
  const routeSummary=`<section class="route-summary">${routeScene}<div class="route-copy"><div class="route-title">${esc(d.week)} · ${scheduleStory(d)}</div><div class="route-subtitle">${esc(r.route)}</div>${r.km?`<div class="route-km">全程 ${esc(r.km)}</div>`:""}</div>${routeBtn}</section>`;
  const timeline=`<section class="schedule-timeline" aria-label="${esc(d.week)} 当日时间线">${d.items.map((it,i)=>scheduleTimelineItem(it,i,isAdmin)).join("")}</section>`;
  const adminControls=isAdmin?`<div class="schedule-admin-add"><button class="btn" onclick="addSchedItem(${ctx.schedDay})">新增时段</button></div><button class="btn schedule-add-day" onclick="editSchedDay(-1)">新增一天行程</button>`:"";
  return `<div class="schedule-page">${routeSummary}${scheduleRouteDrawer()}${scheduleTabs()}<div class="schedule-section-head"><h2>今日路线</h2></div>${timeline}${adminControls}</div>`;
}
function editSchedDay(di){

      <button class="mini" onclick="renameGroupDim('${esc(k)}')">改名「${esc(k)}」</button>

    </div>`:"";

    <div class="grp"><div class="gh">${g==='未分组'?g:esc(g)} (${by[g].length}人)</div>

    ${isAdmin&&g!=='未分组'?`<div style="margin-top:6px"><button class="mini" onclick="editGroupMembers('${esc(k)}','${esc(g)}')">调整成员</button> <button class="mini del" onclick="delGroupCat('${esc(k)}','${esc(g)}')">删除该组</button></div>`:''}</div>`).join("");

  return `<div class="group-page ${tone}">${tabs}${dimBar}${tip}${groupsHtml}${addGrpBtn?`<div style="height:8px"></div>`+addGrpBtn:""}</div>`;

function goGroupTab(i){ctx.groupIdx=i;render();}
/* ---- 维度（分组依据）增删改 ---- */
function addGroupDim(){
  const inner=`<h3>➕ 新增分组维度</h3>
    <div class="f-item"><label>维度名称</label><input id="newdim" placeholder="如：房间分配"></div>
    <button class="btn" onclick="saveNewDim()">创建</button>
    <div style="height:8px"></div><button class="btn ghost" onclick="closeSheet()">取消</button>`;
  showSheet(inner);
}
function saveNewDim(){
  const v=($("#newdim").value||"").trim();
  if(!v){toast("请填写维度名称");return;}
  if(!state.groupFields) state.groupFields=(GROUP_FIELDS||[]).slice();
  if(state.groupFields.includes(v)){toast("已存在同名维度");return;}
  state.groupFields.push(v);
  ctx.groupIdx=GF().filter(k=>ctx.role==="admin"||state.people.some(p=>valOf(p,k))).length; // 跳到新维度
  persist();closeSheet();render();toast("已新增维度「"+v+"」✅");
}
function renameGroupDim(oldName){
  const inner=`<h3>✏️ 维度改名</h3>
    <div class="f-item"><label>把「${esc(oldName)}」改为</label><input id="dimname" value="${esc(oldName)}"></div>
    <button class="btn" onclick="saveDimRename('${esc(oldName)}')">保存</button>
    <div style="height:8px"></div><button class="btn ghost" onclick="closeSheet()">取消</button>`;
  showSheet(inner);
}
function saveDimRename(oldName){
  const nv=($("#dimname").value||"").trim();
  if(!nv){toast("名称不能为空");return;}
  if(nv===oldName){closeSheet();return;}
  if(state.groupFields.includes(nv)){toast("已存在同名维度");return;}
  const i=state.groupFields.indexOf(oldName); if(i>=0) state.groupFields[i]=nv;
  // 把成员身上旧维度的值迁移到新维度名
  state.people.forEach(p=>{ if(p[oldName]!==undefined){ p[nv]=p[oldName]; delete p[oldName]; } });
  persist();closeSheet();render();toast("维度已改名 ✅");
}
function delGroupDim(name){
  const cnt=state.people.filter(p=>valOf(p,name)).length;
  confirmSheet('删除维度「'+name+'」？该维度下所有分组安排都会清空（涉及 '+cnt+' 人的该项分组，成员本身不会被删除）。',()=>{
    const i=state.groupFields.indexOf(name); if(i>=0) state.groupFields.splice(i,1);
    state.people.forEach(p=>{ if(p[name]!==undefined) delete p[name]; });
    ctx.groupIdx=0;
    persist();render();toast("已删除维度「"+name+"」✅");
  });
}

function editGroupMembers(field, groupName){
  const inner=`<h3>调整分组：「${esc(groupName)}」</h3>
    <div class="hint">点击下方成员可加入 / 移出本分组（高亮=已在本组）。改名请在下方输入后点保存。</div>
    <div class="mtwrap" style="display:flex;flex-wrap:wrap;gap:8px;margin:10px 0">`+

       const inG=(valOf(p,field)||"未分组")===groupName;
       return `<span class="mtoggle ${inG?'on':''}" data-pidx="${idx}" data-field="${esc(field)}" data-group="${esc(groupName)}" style="padding:6px 11px;border-radius:999px;border:1px solid var(--line);font-size:14px;cursor:pointer;${inG?'background:var(--brand);color:#fff;border-color:var(--brand)':''}">${esc(displayName(p))}</span>`;
    }).join("")+`</div>

function delGroupCat(field,oldName){

}

    <div class="nt"><div class="th">${n.level==="重要"?`<span class="badge-u">重要</span>`:""}${esc(n.title)}</div>
    <div class="ct">${esc(n.content)}</div><div class="mt">${esc(n.author)} · ${esc(n.time)}</div></div>`).join("");
  }

  // —— 贴士内容 ——（"领队联系方式"置顶，保证显眼；组织者改/删索引仍正确）
  const PIN_TITLE = "领队联系方式";
  const tipOrder = (state.tips||[]).map((t,i)=>({t,i}))
                    .sort((a,b)=> (b.t.title===PIN_TITLE) - (a.t.title===PIN_TITLE));
  let tipHtml;
  if(isAdmin){
    if(!tipOrder.length) tipHtml=`<div class="empty-note">暂无贴士内容</div><button class="btn" onclick="addTip()">+ 新增贴士</button>`;
    else {
      let th='';
      tipOrder.forEach(({t,i})=>{
        th+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">${esc(t.title)}</h3><div><button class="mini" onclick="editTip(${i})">改</button> <button class="mini del" onclick="delTip(${i})">删</button></div></div>${_tipBody(t)}</div>`;
      });
      th+=`<button class="btn" onclick="addTip()">+ 新增贴士</button>`;
      tipHtml=th;
    }
  } else {
    if(!tipOrder.length) tipHtml=`<div class="empty-note">暂无贴士内容</div>`;
    else tipHtml=`<div class="hint">出行必看小贴士。建议出发前通读一遍。</div>`+tipOrder.map(({t})=>`<div class="card"><h3>${esc(t.title)}</h3>${_tipBody(t)}</div>`).join("");
  }

  return `<div class="info-page">${tabs}${ctx.infoTab===0 ? noticeHtml : tipHtml}</div>`;
}
function goInfoTab(i){ctx.infoTab=i;render();}
function editNotice(idx){

/* ============== ADMIN: 数据后台 ============== */
function adminHome(){return adminTable();}
function adminTable(){
  const flds=state.fields;
  const total=state.people.length;
  let head=`<th class="name-col">${esc(NAME_FIELD||"姓名")}</th>`+flds.filter(f=>f.key!==NAME_FIELD).map(f=>`<th>${esc(f.label)}</th>`).join("")+`<th>操作</th>`;

  const syncHint = SYNC_ENABLED ? "" : `<div class="hint">⚠️ 本小程序未配置同步后台，数据仅保存在本机。</div>`;

function delPerson(idx){

}
function editPerson(idx){
  const isNew = idx<0;
  const p = isNew ? Object.fromEntries(state.fields.map(f=>[f.key,""])) : state.people[idx];
  if(isNew) p._id="new"+Date.now();

  state.fields.forEach(f=>{(bymod[f.module]=bymod[f.module]||[]).push(f);});

    inner+=`<div class="grpttl">${esc(m)}</div>`;

  inner+=`<button class="btn" onclick="savePerson(${idx})">保存</button>

function closeSheet(){const m=$("#mask");if(m)m.remove();render();}
function showSheet(inner){
  closeSheet();
  const mask=document.createElement("div");mask.className="mask";mask.id="mask";
  mask.innerHTML=`<div class="sheet">${inner}</div>`;
  mask.onclick=(e)=>{if(e.target===mask)closeSheet();};

}
let _confirmCb=null;
function confirmSheet(msg, cb){
  _confirmCb=cb;
  const inner=`<h3>请确认</h3><div style="font-size:14px;margin:12px 0;color:#374151">${esc(msg)}</div>
    <button class="btn" onclick="doConfirm()">确定</button>
    <div style="height:8px"></div><button class="btn ghost" onclick="closeSheet()">取消</button>`;
  showSheet(inner);
}
function doConfirm(){const cb=_confirmCb;_confirmCb=null;closeSheet();if(cb)cb();}
function savePerson(idx){
  const obj = idx<0 ? window._newObj : state.people[idx];
  document.querySelectorAll('[data-ek]').forEach(el=>{obj[el.dataset.ek]=el.value.trim();});
  if(idx<0) state.people.push(obj);
  else markEdited(obj._id);   // 改已有成员：标记本地已改，云端拉取不被覆盖
  persist(); closeSheet(); render();
}



/* ============== 同步（短链模式：数据存组织者自己的仓库） ============== */
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";t.style.cssText="position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:rgba(17,24,39,.92);color:#fff;padding:10px 16px;border-radius:22px;font-size:13px;z-index:99;max-width:90vw;text-align:center;transition:opacity .3s";document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity="1";
  clearTimeout(t._tm); t._tm=setTimeout(()=>{t.style.opacity="0";},2200);
}
async function copyTextAsync(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    try{ await navigator.clipboard.writeText(text); return true; }catch(e){}
  }
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.cssText="position:fixed;left:-9999px;top:0;opacity:0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{ document.execCommand("copy"); return true; }catch(e){ return false; }
  finally{ ta.remove(); }
}
const SYNC_API = "https://api.github.com/repos/" + SYNC_REPO + "/contents/" + SYNC_FILE;
async function genSyncLink(){
  const SENS=["手机号","身份证号","手机","电话","身份证"];
  const peopleForSync=state.people.map(p=>{const o=Object.assign({},p);SENS.forEach(k=>{ if(o[k]!==undefined) o[k]=""; });return o;});
  const payload={people:peopleForSync, schedule:state.schedule, notices:state.notices, tips:state.tips, overview:state.overview, groupFields:state.groupFields, _ts:Date.now()};

  showSheet(`
    <h3>📤 正在同步...</h3>
    <div style="text-align:center;padding:20px 0">
      <div style="display:inline-block;width:32px;height:32px;border:3px solid #93c5fd;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <div style="margin-top:10px;font-size:13px;color:#6b7280">正在把数据上传到云端...</div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <div id="sync-result"></div>
  `);

  try{
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    let sha = "";
    try{
      const r = await fetch(SYNC_API, {headers:{Authorization:"Bearer "+GITHUB_SYNC_TOKEN}});
      if(r.ok){ const d = await r.json(); sha = d.sha; }
    }catch(e){}

    const body = {message:"sync: "+new Date().toLocaleString('zh-CN'), content:content, branch:SYNC_BRANCH};
    if(sha) body.sha = sha;

    const wr = await fetch(SYNC_API, {
      method: "PUT",
      headers:{Authorization:"Bearer "+GITHUB_SYNC_TOKEN, "Accept":"application/vnd.github+json", "Content-Type":"application/json"},
      body:JSON.stringify(body)
    });

    if(!wr.ok){
      const errText = await wr.text().catch(()=>"未知错误");
      throw new Error("GitHub API 返回 "+wr.status+": "+errText.slice(0,200));
    }

    document.getElementById("sync-result").innerHTML = `
      <div style="text-align:center;padding:10px 0 16px">
        <div style="font-size:40px;line-height:1">✅</div>
        <div style="color:#059669;font-size:15px;font-weight:600;margin-top:8px">已同步到云端！</div>
        <div style="font-size:13px;color:#6b7280;margin-top:6px">伙伴刷新页面（或等待自动刷新）即可看到更新</div>
      </div>
      <button class="btn ghost" onclick="closeSheet()">关闭</button>
    `;
    clearEdited();   // 已推送至云端，本地改标记清空，下次拉取恢复正常
  }catch(e){
    document.getElementById("sync-result").innerHTML = `
      <div style="color:#dc2626;font-size:14px;margin-bottom:8px">❌ 上传失败</div>
      <div style="font-size:12px;color:#6b7280;background:#fef2f2;padding:8px;border-radius:8px">${esc(e.message||"网络错误")}</div>
      <div class="hint" style="margin-top:8px;text-align:left">
        可能的原因：<br>
        • 网络不通（检查手机是否联网）<br>
        • 同步令牌无效 / 仓库名写错（需在生成时填对你自己的仓库+令牌）<br>
        • GitHub 服务暂时不可用<br>
        <br>请稍后重试。
      </div>
      <div style="height:8px"></div>
      <button class="btn ghost" onclick="closeSheet()">关闭</button>
    `;
  }
}
async function doCopyShortLink(){
  const url = document.getElementById("sync-short-url").textContent;
  if(!url){toast("没有可复制的链接");return;}
  const ok = await copyTextAsync(url);
  toast(ok ? "已复制链接 ✅（去微信粘贴发送吧）" : "复制失败，请手动长按上方链接复制");
}
async function fetchJsonFrom(url, headers){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),8000);
  try{
    const r=await fetch(url,{headers:headers||{},cache:"no-store",signal:ctrl.signal});
    if(!r.ok) throw new Error("HTTP "+r.status);
    return await r.json();
  }finally{ clearTimeout(tid); }
}
function decodeBase64Json(b64){
  return JSON.parse(decodeURIComponent(escape(atob(b64.replace(/\s/g,"")))));
}
async function fetchSyncJson(){
  const parts=SYNC_REPO.split("/"); const owner=parts[0]; const repoName=parts[1];
  // ① GitHub API：即时反映最新提交，CORS:*，无 CDN 延迟
  try{
    const u="https://api.github.com/repos/"+SYNC_REPO+"/contents/"+SYNC_FILE+"?ref="+encodeURIComponent(SYNC_BRANCH);
    const d=await fetchJsonFrom(u,{Authorization:"Bearer "+GITHUB_SYNC_TOKEN,Accept:"application/vnd.github+json"});
    if(d&&d.content) return decodeBase64Json(d.content);
  }catch(e){}
  // ② raw.githubusercontent.com：即时，CORS:*
  try{
    const u="https://raw.githubusercontent.com/"+SYNC_REPO+"/"+SYNC_BRANCH+"/"+SYNC_FILE;
    const d=await fetchJsonFrom(u);
    if(d) return d;
  }catch(e){}
  // ③ 同域 Pages：最兼容微信，但 CDN 最长 10 分钟
  const base=(repoName===owner+".github.io")?("https://"+owner+".github.io"):("https://"+owner+".github.io/"+repoName);
  return await fetchJsonFrom(base+"/"+SYNC_FILE+"?_t="+Date.now());
}
const SENS_FIELDS=["手机号","身份证号","手机","电话","身份证"];
function mergeSyncData(data){
  if(data.people && data.people.length){
    const localMap=new Map(state.people.map(p=>[p._id,p]));
    const cloudIds=new Set(data.people.map(p=>p._id));
    const result=[];
    // ① 云端里的人：本地改过的 → 保留本地(不被覆盖)；其余 → 用云端(补回敏感字段)
    data.people.forEach(p=>{
      if(state._edited && state._edited[p._id]){
        const local=localMap.get(p._id);
        result.push(local || p);
      }else{
        const local=localMap.get(p._id);
        if(local){ SENS_FIELDS.forEach(k=>{ if(!p[k] && local[k]) p[k]=local[k]; }); }
        result.push(p);
      }
    });
    // ② 本地新增、云端还没有的人(如组织者刚加的成员)：保留，避免被拉取冲掉
    state.people.forEach(p=>{ if(p && p._id && !cloudIds.has(p._id)) result.push(p); });
    state.people=result;
  }
  // 仅当云端该板块确有内容时才覆盖，避免空数组把本地数据清空
  if(data.schedule && data.schedule.length) state.schedule=data.schedule;
  if(data.notices && data.notices.length) state.notices=data.notices;
  if(data.tips && data.tips.length) state.tips=data.tips;
  if(data.overview && data.overview.length) state.overview=data.overview;
  if(data.groupFields && data.groupFields.length) state.groupFields=data.groupFields;
  persist();
}
let _lastSyncTs=0;
async function silentSync(){
  try{
    const data=await fetchSyncJson();
    if(data && data._ts && data._ts!==_lastSyncTs){
      const changed=(_lastSyncTs!==0);
      mergeSyncData(data);
      _lastSyncTs=data._ts;
      if(changed) toast("已同步最新安排 ✅");
    }
  }catch(e){ /* 静默失败，不阻塞页面 */ }
}
async function applyRemoteSync(){
  const overlay = document.createElement("div");
  overlay.id = "sync-overlay";
  overlay.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center";
  overlay.innerHTML = `
    <div style="width:36px;height:36px;border:3.5px solid #93c5fd;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite"></div>
    <div style="margin-top:16px;font-size:15px;color:#374151;font-weight:500">正在同步最新数据...</div>
    <div style="margin-top:6px;font-size:12px;color:#9ca3af">从组织者仓库获取最新安排</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  `;
  document.body.appendChild(overlay);
  try{
    const data = await fetchSyncJson();
    mergeSyncData(data);
    _lastSyncTs = data._ts || _lastSyncTs;
    overlay.innerHTML = `
      <div style="font-size:40px">✅</div>
      <div style="margin-top:12px;font-size:16px;color:#059669;font-weight:600">同步完成！</div>
      <div style="margin-top:4px;font-size:13px;color:#6b7280">已获取组织者最新安排</div>
    `;
    setTimeout(() => {
      const ov = document.getElementById("sync-overlay");
      if(ov) ov.remove();
      if(ctx.role) render(); else renderSplash();
    }, 1200);
  }catch(e){
    overlay.innerHTML = `
      <div style="font-size:36px">⚠️</div>
      <div style="margin-top:12px;font-size:15px;color:#dc2626;font-weight:600">同步失败</div>
      <div style="margin-top:6px;font-size:12px;color:#6b7280;max-width:280px;text-align:center">${esc(e.message||"无法连接服务器")}</div>
      <div style="margin-top:16px">
        <button class="btn" onclick="manualResync()">重试</button>
        <button class="btn ghost" onclick="(function(){var ov=document.getElementById('sync-overlay');if(ov)ov.remove();if(ctx.role)render();else renderSplash();})()">进入网页</button>
      </div>
    `;
  }
}
async function manualResync(){
  if(!SYNC_ENABLED){ toast("该小程序未配置同步后台"); return; }
  await applyRemoteSync();
  clearEdited();   // 用户主动拉取=以云端为准，清除本地改标记
}
let _autoTimer=null;
function startAutoRefresh(){
  if(_autoTimer) clearInterval(_autoTimer);
  if(!SYNC_ENABLED) return;
  _autoTimer=setInterval(async ()=>{
    try{
      const data=await fetchSyncJson();
      if(data && data._ts && data._ts!==_lastSyncTs){
        mergeSyncData(data); _lastSyncTs=data._ts;
        if(ctx.role) render();
        toast("已同步组织者最新更新 ✅");
      }
    }catch(e){}
  }, 45000);
}
async function tryBackendIdentify(){
  // 企业微信自动识别（小后端版）：打开页面先问后端“我是谁”
  try{
    const r = await fetch('/api/me', {credentials:'same-origin'});
    if(!r.ok) return false;                 // 404/无后端 = 纯静态模式，退回下拉框
    const data = await r.json().catch(()=>null);
    if(!data) return false;
    if(data.authed===true && data.id){       // 后端已认出我 -> 直接进首页，跳过公共下拉框
      const p = state.people.find(x=>x._id===data.id);
      if(p){ ctx.role="member"; ctx.me=data.id; ctx.tab="home"; render(); return true; }
    }
    if(data.authed===false){                 // 后端在线但未登录 -> 跳到登录页（模拟企业微信一键识别）
      const sp=new URLSearchParams(location.search);
      if(sp.get('splash')!=='1'){ location.replace('/login'); }
      return true;
    }
    return false;
  }catch(e){ return false; }                 // 网络失败 = 纯静态，保持原样
}
async function init(){
  const params = new URLSearchParams(location.search);
  if(params.get("s") === "1"){
    try{ history.replaceState(null,"",location.pathname); }catch(e){}
  }
  const h=location.hash||"";
  const m=h.match(/#sync=(.+)$/);
  if(m){ toast("⚠️ 这是旧版同步链接，可能已失效。请组织者重新生成。"); try{ history.replaceState(null,"",location.pathname); }catch(e){} }
  if(SYNC_ENABLED){
    // 单链接自动同步：进入即拉取最新，后台定时刷新（组织者改完参与者自动更新）
    silentSync().then(()=>{ if(ctx.role) render(); });
    startAutoRefresh();
  } else if(params.get("s") === "1"){
    toast("该小程序未配置同步后台");
  }
  const handled = await tryBackendIdentify();
  if(!ctx.role) renderSplash();
}
// 生成浮动光点（青蓝主题动态背景）
(function(){
  var pc=document.getElementById('particles');
  if(!pc) return;
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce) return;
  for(var i=0;i<16;i++){
    var p=document.createElement('div');
    p.className='particle';
    var size=2+Math.random()*4;
    p.style.width=size+'px';p.style.height=size+'px';
    p.style.left=(Math.random()*100)+'%';
    p.style.animationDelay=(-Math.random()*18)+'s';
    p.style.animationDuration=(12+Math.random()*10)+'s';
    pc.appendChild(p);
  }
})();
init();
