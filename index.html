<style>
:root{--brand:#2563eb;--brand2:#1d4ed8;--bg:#f2f4f8;--card:#fff;--ink:#1f2937;--sub:#6b7280;--line:#e5e7eb;--ok:#059669;--okbg:#ecfdf5;--warn:#d97706;--warnbg:#fffbeb;--red:#dc2626;--redbg:#fef2f2;--lock:#eff6ff;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:64px}
/* splash */
.splash{position:fixed;inset:0;background:linear-gradient(160deg,#1e3a8a,#2563eb 60%,#3b82f6);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:50;padding:30px}
.splash h1{font-size:26px;margin-bottom:6px;text-align:center}
.splash p{opacity:.85;margin-bottom:40px;font-size:14px;text-align:center}
.role-btn{width:260px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.5);color:#fff;padding:16px;border-radius:14px;font-size:17px;margin-bottom:14px;cursor:pointer;backdrop-filter:blur(4px);transition:.15s}
.role-btn:active{transform:scale(.97)}
.role-btn b{display:block;font-size:18px}
.role-btn span{font-size:12px;opacity:.8}
.pwd{width:260px;margin-top:6px}
.pwd input{width:100%;padding:12px;border-radius:10px;border:none;font-size:15px;text-align:center}
.pick-search{width:100%;padding:11px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.12);color:#fff;font-size:14px;box-sizing:border-box}
.pick-search::placeholder{color:rgba(255,255,255,.65)}
.pick-list{max-height:230px;overflow:auto;margin-top:8px;background:rgba(255,255,255,.1);border-radius:10px;padding:4px}
.mem-pick{padding:11px 14px;color:#fff;font-size:15px;border-radius:8px;cursor:pointer;transition:.12s}
.mem-pick:active{background:rgba(255,255,255,.25)}
.mem-pick.empty{opacity:.6;cursor:default;text-align:center;font-size:13px}
/* header */
.hd{position:sticky;top:0;background:var(--brand);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;z-index:20}
.hd .t{font-size:17px;font-weight:600}
.hd .sw{font-size:12px;background:rgba(255,255,255,.2);padding:5px 10px;border-radius:20px;cursor:pointer}
/* page */
.page{padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.mod-tag{font-size:11px;padding:1px 8px;border-radius:6px;background:var(--lock);color:var(--brand);font-weight:600}
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid #f1f3f5;gap:10px}
.row:last-child{border-bottom:none}
.row .k{color:var(--sub);font-size:13px;flex-shrink:0}
.row .v{font-weight:600;text-align:right;word-break:break-all;font-size:13px}
.row .v.empty{color:#cbd5e1;font-weight:400}
.lockicon{font-size:10px;color:var(--brand);background:var(--lock);padding:1px 5px;border-radius:4px;margin-left:4px}
.big-name{font-size:20px;font-weight:700;margin-bottom:2px}
.dept{color:var(--sub);font-size:13px;margin-bottom:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.chip{background:var(--lock);color:var(--brand);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600}
.btn{display:block;width:100%;background:var(--brand);color:#fff;border:none;padding:13px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.btn:active{background:var(--brand2)}
.btn.ghost{background:#fff;color:var(--brand);border:1.5px solid var(--brand)}
.btn.sm{width:auto;padding:6px 14px;font-size:13px;display:inline-block;margin:0}
/* form */
.f-item{margin-bottom:14px}
.f-item label{display:block;font-size:13px;color:var(--sub);margin-bottom:5px}
.f-item input,.f-item select{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff}
.sheet textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff;min-height:60px;font-family:inherit;margin-top:6px;box-sizing:border-box}
.f-note{font-size:11px;color:#94a3b8;margin-top:3px}
.sens-badge{font-size:10px;background:var(--redbg);color:var(--red);padding:1px 6px;border-radius:5px;margin-left:5px}
/* schedule */
.day{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.day .dh{background:#f8fafc;padding:11px 14px;font-weight:600;font-size:14px;border-bottom:1px solid var(--line)}
.day .di{padding:12px 14px;border-bottom:1px solid #f1f3f5}
.day .di:last-child{border-bottom:none}
.di .tt{font-weight:600;font-size:14px}
.di .meta{font-size:12px;color:var(--sub);margin-top:3px}
.di .tip{font-size:12px;color:var(--warn);background:var(--warnbg);padding:5px 8px;border-radius:7px;margin-top:6px}
/* notice */
.nt{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.nt .th{font-weight:600;display:flex;align-items:center;gap:6px}
.badge-u{font-size:10px;background:var(--redbg);color:var(--red);padding:1px 7px;border-radius:5px}
.nt .ct{font-size:13px;color:#374151;margin:6px 0}
.nt .mt{font-size:11px;color:var(--sub)}

.ck{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.ck .info .n{font-weight:600;font-size:14px}
.ck .info .t{font-size:12px;color:var(--sub);margin-top:2px}
.ck .st-done{background:var(--okbg);color:var(--ok);font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px}
.ck .st-btn{background:var(--brand);color:#fff;font-size:13px;font-weight:600;padding:6px 16px;border-radius:20px;cursor:pointer;border:none}
/* groups */
.grp{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.grp .gh{font-weight:600;margin-bottom:8px;font-size:14px}
.grp .gm{display:flex;flex-wrap:wrap;gap:6px}
.grp .m{background:#f1f5f9;padding:4px 10px;border-radius:16px;font-size:12px}
.grp .m.me{background:var(--brand);color:#fff}
/* members list */
.mem{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px;gap:10px}

.mem .md{font-size:11px;color:var(--sub);margin-top:2px}
.mem .mtags{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.mem .mtags .chip{font-size:11px;padding:3px 9px}
.search{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:12px;font-size:14px;background:#fff;margin-bottom:12px;box-sizing:border-box}

.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;flex:1;text-align:center}
.stat .num{font-size:22px;font-weight:700;color:var(--brand)}
.stat .lb{font-size:11px;color:var(--sub)}
.tbl-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--line);border-radius:12px;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;font-size:12px;white-space:nowrap}
th,td{border:1px solid var(--line);padding:7px 9px;text-align:left}
th{background:#f8fafc;position:sticky;top:0;font-weight:600}
td.name-col{position:sticky;left:0;background:#fff;font-weight:600;z-index:1}
th.name-col{position:sticky;left:0;z-index:2}
tr:nth-child(even) td{background:#fcfcfd}
tr:nth-child(even) td.name-col{background:#fcfcfd}
.mini{font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid var(--line);cursor:pointer;background:#fff}
.mini.del{color:var(--red);border-color:#fecaca}

.mask{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:60}
.sheet{background:#fff;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:18px}
.sheet h3{font-size:17px;margin-bottom:14px}
.sheet .grpttl{font-size:12px;color:var(--brand);font-weight:700;margin:14px 0 6px}

.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--line);display:flex;z-index:30}
.tab{flex:1;text-align:center;padding:8px 0 7px;font-size:11px;color:var(--sub);cursor:pointer}
.tab.on{color:var(--brand)}
.tab .ic{font-size:19px;display:block;line-height:1.2}
.empty-note{text-align:center;color:#94a3b8;font-size:13px;padding:30px}
.hint{font-size:12px;color:var(--sub);background:var(--warnbg);border:1px solid #fde68a;padding:9px 12px;border-radius:10px;margin-bottom:12px}
/* tips */
.tip-body{font-size:13px;color:#374151;white-space:pre-wrap;line-height:1.7}
.tip-sub{font-size:13px;color:var(--brand);font-weight:700;margin:12px 0 4px}
.tip-cat{font-size:12px;color:var(--brand);font-weight:700;margin:10px 0 4px}
.tip-item{padding:8px 0;border-bottom:1px solid #f1f3f5}
.tip-item:last-child{border-bottom:none}
.ti-name{font-size:13px;font-weight:600}
.ti-detail{font-size:12px;color:var(--sub);margin-top:3px}
/* schedule overview + day tabs */
.ov{background:linear-gradient(135deg,#eff6ff,#f8fafc)}
.ovh{font-weight:700;margin-bottom:8px;font-size:14px}
.ovr{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #eef2f7;align-items:flex-start}
.ovr:last-child{border-bottom:none}
.ovd{font-weight:700;color:var(--brand);flex-shrink:0;width:28px}
.ovrt{flex:1;font-size:13px}
.ovk{font-size:11px;color:var(--sub);flex-shrink:0;background:#f1f5f9;padding:2px 8px;border-radius:10px;white-space:nowrap}
.daytabs{display:flex;gap:6px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch}
.dtab{flex:1;min-width:60px;text-align:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 4px;cursor:pointer;flex-shrink:0}

</style>

绒或羽绒+冲锋衣或防风外套），\n早晚：至少三件衣服（打底长袖+抓绒或羽绒+冲锋衣或防风外套）。\n个别地方海拔高温差更大，建议多带一件保暖衣物备用（羽绒服，毛衣之类），需按照约-5℃的极限温度准备。\n*其他换洗衣物看个人情况自备。"}]}, {"title": "个人物品建议", "type": "items", "groups": [{"name": "证件", "items": [{"name": "证件☆☆☆☆☆", "detail": "身份证"}]}, {"name": "日用", "items": [{"name": "保温杯☆☆☆☆☆", "detail": "常饮温开水，防止肠胃不适，有效预防高原反应，随身携带"}, {"name": "双肩背包☆☆☆☆☆", "detail": "随身携带，放置重要物品及应急物品，冲锋衣/外套/保暖衣物（冷了穿、热了放包里）、雨具、保温杯、零食、身份证等"}, {"name": "个人洗漱用品☆☆", "detail": "一晚是酒店、两晚是民宿，民宿洗浴用品一般，介意根据个人需要自带。"}, {"name": "墨镜/墨镜夹片☆☆☆", "detail": "防烈日眩光，防紫外线，防风"}, {"name": "帽子☆☆☆☆☆", "detail": "防风、防晒、保暖，棒球帽、渔夫帽、面线帽均可"}, {"name": "雨伞☆☆☆", "detail": "高原天气多变，雨具需随身携带，工作人员也将统一准备雨衣。"}]}, {"name": "防护保养", "items": [{"name": "防晒霜☆☆☆☆☆", "detail": "spf50+"}, {"name": "润唇膏☆☆☆☆☆", "detail": "高原天气干燥，防止嘴唇干裂"}, {"name": "护肤品、面膜☆☆☆", "detail": "高原天气干燥，容易晒伤，根据个人情况携带护肤品"}]}, {"name": "衣物", "items": [{"name": "外套☆☆☆☆☆", "detail": "风衣/冲锋衣"}, {"name": "保暖层☆☆☆☆☆", "detail": "抓绒/毛衣/中度填充羽绒服"}, {"name": "鞋子", "detail": "运动鞋/徒步登山鞋均可，路面较为平坦，着舒适运动鞋、徒步登山鞋均可以；防水最佳"}]}, {"name": "药品", "items": [{"name": "个人药品☆☆☆☆☆", "detail": "随队有急救药箱和药品，其他药品根据个人需要自行携带"}]}, {"name": "其他", "items": [{"name": "根据个人需要☆☆☆", "detail": "相机、充电器、充电宝、手环或手表（随时测量血氧心跳等身体数据）等根据个人需要携带"}]}], "blocks": []}, {"title": "预防高反相关事项", "type": "blocks", "groups": [], "blocks": [{"kind": "subtitle", "subtitle": "预防高原反应", "text": "1.初到高原，当晚及第二天早一定不要洗头洗澡，不建议熬夜、饮酒等行为\n2.高原预防高原反应的几个关键点，注意不要剧烈运动，保证充足睡眠，做好保暖，带上水杯或保温杯尽可能多喝热水；\n3.保持良好心态，初上高原，容易有其中一种或者多种反应：头痛、头昏、恶心呕吐、心慌气短、脉搏增快、胸闷胸痛、失眠、食欲减退等，我们也会携带备用氧气瓶。一般休息一晚即可适应高原环境。出现不舒服的情况，一定要及时告知领队；\n4.高反常见的诱发原因：剧烈运动、淋雨吹风受凉、过度紧张、熬夜睡眠不足、初到高原洗头洗澡、初到高原喝酒等行为；\n5.多喝酥油茶、热水可以有效预防高原反应。"}, {"kind": "subtitle", "subtitle": "行前准备", "text": "1.尽量在临行一周科学的调整作息时间，保证好的身体状态；（如不确定自身情况，如高血压，心脏病等，可提前做个高原体检，以医生建议为准）\n2.若有明显心、肺、肾等不适，高血压三期以上、重感冒者，均不宜进入高海拔地区。\n3.出发前，注意身体，谨防感冒、发烧等情况出现。"}, {"kind": "subtitle", "subtitle": "适应期", "text": "1.保持愉悦的心情（有些高原反应也是由于过度紧张引起），保证充分的休息和睡眠；\n2.第一天不要洗澡或者洗头；\n3.应注意多饮热水，多吃水果，保证饮食营养均衡，避免暴饮暴食，第一天尽量避免喝酒；\n4.高原昼夜温差大，注意保暖防寒，防止出现感冒诱发其他高原反应，车上应有多备衣服，可以准备帽子避免冷5.风直接吹头；\n6.如有高原反应，可根据反应的强度，适当的采取辅助治疗，如葡萄糖水剂、高原安、芬必得，或者吸氧等；\n7.尽量避免剧烈的运动和活动，少跑、跳，多休息；\n8.如有不适，请及时向领队反馈"}]}, {"title": "自驾须知", "type": "blocks", "groups": [], "blocks": [{"kind": "subtitle", "subtitle": "车辆介绍", "text": "【坦克300】专为追求硬派越野和豪华驾驶体验的消费者设计。这款车型结合了复古的外观与现代科技，拥有较高的越野能力和舒适性，非常适合长途自驾活动。下面是一些在自驾活动中比较常用的功能：\n四驱系统：坦克300配备了分时四驱系统，允许驾驶员根据路况选择两驱或四驱模式。\n越野模式：车辆内置多种驾驶模式，如雪地、沙地、岩石爬行等，可根据不同的地形选择最佳驾驶模式。\n车身稳定系统：在复杂路况下，车身稳定系统能够帮助维持车辆稳定，减少打滑的风险。\n倒车影像与雷达：在狭窄的道路上停车或倒车时，这些功能可以帮助驾驶员更安全地操控车辆。\n多媒体系统：集成导航、蓝牙音频流、电话等功能，提供娱乐和信息，使长途驾驶更加舒适。\n座椅加热与通风：长途驾驶中，这些功能可以提供额外的舒适性，特别是在不同季节的变换中。"}, {"kind": "subtitle", "subtitle": "安全驾驶", "text": "遵守交规：严格遵守当地的交通法规，注意限速标志。\n驾驶技巧：坦克300具有较好的越野性能，但在崎岖路面仍需缓慢行驶，避免损伤车辆。\n高原驾驶：西藏地区海拔高，车辆动力会有所下降，驾驶时留心观察车辆表现。\n疲劳驾驶：避免长时间连续驾驶，每两小时至少休息一次。\n适应海拔：初入高原，给身体足够的时间适应，避免剧烈运动。\n症状监测：注意高原反应症状，如头痛、恶心，必要时寻求医疗帮助。"}]}, {"title": "旅行须知", "type": "blocks", "groups": [], "blocks": [{"kind": "subtitle", "subtitle": "民俗及注意事项", "text": "1.宗教信仰：西藏主要是藏传佛教的信仰中心，藏民非常虔诚，尊重他们的宗教活动和场所。在参观寺庙时，不要触摸佛像、经书，避免在寺内大声喧哗，尊重僧侣和信徒。\n2.经幡与玛尼堆：沿途可见的彩色经幡和玛尼堆是藏民祈福的方式，不要随意破坏或踩踏，它们被认为是神圣的。\n3.转经与绕行：转经筒和绕行寺庙、佛塔时必须顺时针方向，逆向被视为不敬。\n4.服饰礼仪：参观寺庙时，穿着应保守，避免短裤、短裙，部分场合可能要求不戴墨镜。\n5.拍照许可：拍照前尤其是拍摄藏民、僧侣或宗教仪式时，务必获得许可，尊重他人隐私。"}, {"kind": "subtitle", "subtitle": "饮食", "text": "西藏地区，以川菜口味居多，活动中的用餐都是根据多年经验，筛选出符合内地人口味、口碑较好的餐厅。如有过敏、忌口或少数民族禁忌请提前告知，我们将会提醒餐厅注意"}, {"kind": "subtitle", "subtitle": "温馨提示", "text": "1、飞机进藏：建议登机牌选择左侧靠窗，这样左侧的喜马拉雅山脉一览无余。飞机离开的时候建议登机牌选择右侧靠窗，这样右侧可以看到诸多雪山！（部分时候会遇到特殊情况，飞机飞行过程中就不让打开遮光板了，此条仅作参考）\n2、出行前兑换一些一元的纸币（沿途上简易厕所，或者遇到一些诵经乞讨的人需要，或者进入寺庙朝拜祈福，当地不收硬币）（一些发达城市已经不发行1元纸币难以兑换到，可以换一些5元或10元的纸币带着，随身也带几百块钱的现金，预防信号不好或应急用）\n3、西藏全境没有4G/5G网络覆盖，网速较慢，建议选择移动和电信号码，网络相对较好。（西藏移动支付也很方便）\n4、藏区旅游时切勿私自行走，以免与当地藏狗、牦牛等发生冲突，产生意外！\n5、在活动过程中，如果需要短暂离开团队，需要征询导游、领队的同意方便团友等待。\n6、请记住约好的集合时间和地点。如在团队徒步过程迷路。请在原地等待领队，勿擅自行走并拨打领队电话。"}]}, {"title": "领队联系方式", "type": "blocks", "groups": [], "blocks": [{"kind": "text", "text": "子迁 18617061181、大胜 18823448331"}]}], "overview": [{"day": "D1", "route": "米林机场—佛掌沙丘—派镇吞白村—达林村—索松村", "km": "105公里"}, {"day": "D2", "route": "索松村—尼洋河风光带—巴河镇—巴松措—新措", "km": "247公里"}, {"day": "D3", "route": "巴松措景区内", "km": "30公里"}, {"day": "D4", "route": "巴松措—林芝米林机场", "km": "168公里"}]};

/* ============== 本地持久化（按活动隔离） ============== */
const LS_KEY = "tj_" + btoa(unescape(encodeURIComponent(EVENT_TITLE))).replace(/[^a-zA-Z0-9]/g,"").slice(0,18);
const DATA_VERSION = 3;
let state = JSON.parse(JSON.stringify(DATA));
try{
  const saved = localStorage.getItem(LS_KEY);
  if(saved){
    const s = JSON.parse(saved);
    if(s.v === DATA_VERSION){
      if(s.people) state.people = s.people;
      if(s.schedule) state.schedule = s.schedule;
      if(s.notices) state.notices = s.notices;
      if(s.tips) state.tips = s.tips;
      if(s.overview) state.overview = s.overview;
    }
  }
}catch(e){}
function persist(){localStorage.setItem(LS_KEY, JSON.stringify({v:DATA_VERSION, people:state.people, schedule:state.schedule, notices:state.notices, tips:state.tips, overview:state.overview}));}

/* ============== 口令（默认可配置 + 应用内修改） ============== */
const PWD_KEY = LS_KEY + "_pwd";
let ADMIN_PWD = (ADMIN_PWD_DEFAULT || "8888");
try{ const sp = localStorage.getItem(PWD_KEY); if(sp) ADMIN_PWD = sp; }catch(e){}

/* ============== 通用工具 ============== */
let ctx = {role:null, me:null, tab:"home", schedDay:0, groupIdx:0};
const $=(s)=>document.querySelector(s);
const app=$("#app");
function maskPhone(p){return p&&p.length>=7 ? p.slice(0,3)+"****"+p.slice(-4) : (p||"");}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function displayName(p){ return (p&&p[NAME_FIELD]) || (p&&p["身份证姓名"]) || (p&&p["中文名"]) || (state.fields&&state.fields[0]?p[state.fields[0].key]:"") || "—"; }
function subLine(p){ return (p&&SUB_FIELD&&p[SUB_FIELD]) ? p[SUB_FIELD] : ""; }
function findMe(){return state.people.find(p=>p._id===ctx.me)||state.people[0];}
function fieldByKey(k){return state.fields.find(f=>f.key===k);}
function valOf(p,k){return (p&&p[k]!=null)?String(p[k]):"";}

/* ============== SPLASH ============== */
function renderSplash(){
  app.innerHTML = `
  <div class="splash">
    <h1>${esc(EVENT_TITLE)}</h1>
    <p>${esc(EVENT_SUBTITLE)}</p>
    <div class="role-btn" onclick="chooseMember()">
      <b>我是参与者</b><span>查看我的信息 / 填写个人资料</span>
    </div>
    <div class="role-btn" onclick="askAdmin()">
      <b>我是组织者</b><span>管理后台 · 增删改全部信息</span>
    </div>
    <div id="pwdbox"></div>
  </div>`;
}
function chooseMember(){
  app.innerHTML = `
  <div class="splash">
    <h1>${esc(EVENT_TITLE)}</h1>
    <p>请选择 / 输入你的姓名</p>
    <div class="pwd">
      <input id="memname" placeholder="可直接输入你的名字" autocomplete="off" oninput="filterPick()">
      <div class="role-btn" style="margin-top:10px" onclick="setMember()"><b>进入</b></div>
    </div>
    <div class="hint" style="margin-top:12px;width:300px;max-width:86vw">请填写与报名表一致的姓名</div>
    <div style="width:300px;max-width:86vw;margin:14px auto 0">
      <input id="picksearch" class="pick-search" placeholder="🔍 搜索姓名" oninput="filterPick()">
      <div id="picklist" class="pick-list"></div>
    </div>
    <div class="role-btn ghost" onclick="renderSplash()" style="margin-top:14px"><b>返回</b></div>
  </div>`;
  filterPick();
  setTimeout(()=>{$("#memname")&&$("#memname").focus();},100);
}
function filterPick(){
  const q=(($("#picksearch")&&$("#picksearch").value)||"").trim();
  const list=$("#picklist"); if(!list)return;
  const hit=state.people.filter(p=>displayName(p).includes(q));
  list.innerHTML = hit.length
    ? hit.map(p=>`<div class="mem-pick" onclick="pickMember('${esc(p._id)}')">${esc(displayName(p))}</div>`).join("")
    : `<div class="mem-pick empty">无匹配姓名</div>`;
}
function pickMember(id){
  const p=state.people.find(x=>x._id===id);
  if(!p)return;
  $("#memname").value=displayName(p);
  setMember();
}
function setMember(){
  const v=$("#memname").value.trim();
  if(!v){alert("请填写正确的姓名信息～");return;}
  const p=state.people.find(x=>displayName(x)===v);
  if(!p){alert("未找到「"+v+"」，请从下拉中选择与报名表一致的姓名");return;}
  ctx.role="member"; ctx.me=p._id; ctx.tab="home"; render();
}
function askAdmin(){
  $("#pwdbox").innerHTML = `<div class="pwd">
    <input id="pw" type="text" placeholder="输入组织者口令" autocomplete="off">
    <div class="role-btn" style="margin-top:10px" onclick="checkAdmin()"><b>进入后台</b></div>
  </div>`;
  setTimeout(()=>$("#pw")&&$("#pw").focus(),100);
}
function checkAdmin(){
  const v=$("#pw").value.trim();
  if(v===ADMIN_PWD){ctx.role="admin";ctx.tab="admin";render();}
  else{alert("口令错误");}
}

/* ============== MAIN RENDER ============== */
function render(){
  if(!ctx.role){renderSplash();return;}
  const isAdmin = ctx.role==="admin";
  const title = isAdmin ? "组织者后台" : EVENT_TITLE;
  let body="";
  if(ctx.tab==="home") body = isAdmin ? adminHome() : memberHome();
  else if(ctx.tab==="edit") body = editForm();
  else if(ctx.tab==="schedule") body = scheduleView();
  else if(ctx.tab==="groups") body = groupsView();
  else if(ctx.tab==="notice") body = noticeView();
  else if(ctx.tab==="members") body = membersView();
  else if(ctx.tab==="tips") body = tipsView();
  else if(ctx.tab==="admin") body = adminTable();
  else if(ctx.tab==="me") body = memberHome();

  const sw = `<span class="sw" onclick="switchRole()">${isAdmin?"切换为参与者":"切换身份"}</span>`;
  const gearBtn = "";
  const syncBtn = (isAdmin && SYNC_ENABLED) ? `<button class="btn sm ghost" style="margin-left:auto;font-size:12px;padding:4px 10px;white-space:nowrap" onclick="genSyncLink()">📤 同步</button>` : "";
  app.innerHTML = `<div class="hd"><span class="t">${title}</span>${sw}${gearBtn}${syncBtn}</div><div class="page">${body}</div>${tabbar()}`;
}
function switchRole(){ctx.role=null;ctx.tab="home";render();}
function go(t){ctx.tab=t;render();}

function tabbar(){
  const isAdmin=ctx.role==="admin";
  const tabs = isAdmin
   ? [["admin","📋","数据后台"],["schedule","🗓","行程"],["groups","🚗","分组"],["notice","📢","公告"],["tips","📖","贴士"]]
   : [["home","🏠","我的"],["members","👥","成员"],["schedule","🗓","行程"],["groups","🚗","分组"],["notice","📢","公告"],["tips","📖","贴士"]];
  return `<div class="tabbar">`+tabs.map(([k,ic,lb])=>
    `<div class="tab ${ctx.tab===k||(k==='home'&&ctx.tab==='edit')?'on':''}" onclick="go('${k}')"><span class="ic">${ic}</span>${lb}</div>`
  ).join("")+`</div>`;
}

/* ============== MEMBER: 我的信息（通用·按模块分组） ============== */
function memberHome(){
  const me=findMe();
  const modules={};
  state.fields.filter(f=>f.key!=="身份证姓名").forEach(f=>{(modules[f.module]=modules[f.module]||[]).push(f);});
  let cards=Object.keys(modules).map(m=>{
    const rows=modules[m].map(f=>{
      let v=valOf(me,f.key);
      if(f.sensitive){ v = (f.key.indexOf("手机")>=0||f.key.indexOf("电话")>=0)?maskPhone(v):(v?"已加密·仅组织者可见":""); }
      const lock = f.editor==="admin" ? `<span class="lockicon">🔒只读</span>` : "";
      const sens = f.sensitive ? `<span class="sens-badge">脱敏</span>`:"";
      return `<div class="row"><span class="k">${esc(f.label)}${lock}${sens}</span><span class="v ${v?'':'empty'}">${v?esc(v):"未填写"}</span></div>`;
    }).join("");
    return `<div class="card"><h3><span class="mod-tag">${esc(m)}</span></h3>${rows}</div>`;
  }).join("");

  const chips=(CHIP_FIELDS||[]).filter(k=>valOf(me,k)).map(k=>`<span class="chip">${esc(k)}: ${esc(valOf(me,k))}</span>`).join("");

  return `
  <div class="card">
    <div class="big-name">${esc(displayName(me))}</div>
    ${subLine(me)?`<div class="dept">${esc(subLine(me))}</div>`:`<div style="height:8px"></div>`}
    ${chips?`<div class="chips">${chips}</div>`:""}
  </div>
  ${cards}
  <button class="btn" onclick="go('edit')">✏️ 编辑我的资料</button>
  <div style="height:8px"></div>
  <div class="hint">切换到「组织者」身份可看到全部人员的完整信息并统一安排${GROUP_FIELDS&&GROUP_FIELDS.length?(" / "+GROUP_FIELDS.join(" / ")):""}。</div>
  <div style="height:8px"></div>
  ${SYNC_ENABLED?`<div class="role-btn ghost" onclick="manualResync()"><b>🔄 重新同步最新数据</b></div>`:""}`;
}

/* ============== MEMBER: 编辑表单 ============== */
function editForm(){
  const me=findMe();
  const editable = state.fields.filter(f=>f.editor==="member" && f.key!=="身份证姓名");
  const bymod={};
  editable.forEach(f=>{(bymod[f.module]=bymod[f.module]||[]).push(f);});
  let html=`<div class="hint">这里只放「你自己要填」的字段；${GROUP_FIELDS&&GROUP_FIELDS.length?GROUP_FIELDS.join(" / ")+" 等":""}由组织者统一安排，你在上一页只能看。</div>`;
  Object.keys(bymod).forEach(m=>{
    html+=`<div class="card"><h3><span class="mod-tag">${esc(m)}</span></h3>`;
    bymod[m].forEach(f=>{
      const v=valOf(me,f.key);
      const sens=f.sensitive?`<span class="sens-badge">敏感·脱敏展示</span>`:"";
      let input;
      if(f.type==="select"){
        const preset=(f.options&&f.options.length)?f.options:["","是","否"];
        input=`<select data-k="${f.key}">`+preset.map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join("")+`</select>`;
      }else{
        input=`<input data-k="${f.key}" value="${esc(v)}" placeholder="请输入${esc(f.label)}">`;

function saveEdit(){
  const me=findMe();
  document.querySelectorAll('[data-k]').forEach(el=>{me[el.dataset.k]=el.value.trim();});

}

/* ============== MEMBER: 成员名单 ============== */
function membersView(){
  const me=findMe();
  const meId=me?me._id:null;
  return `<div class="hint">全部参与成员（共 ${state.people.length} 人）。${GROUP_FIELDS&&GROUP_FIELDS.length?"点「分组」可按"+(GROUP_FIELDS.join("/"))+"查看；":""}带 <span style="color:var(--brand)">●</span> 的是「我」。</div>`+
    `<input id="memsearch" class="search" placeholder="🔍 搜索姓名 / ${esc(SUB_FIELD||"部门")} / 分组" oninput="filterMembers(this.value)">`+
    `<div id="memlist">${memListHtml(meId,"")}</div>`;
}
function memListHtml(meId,q){
  q=(q||"").trim();
  const arr=state.people.filter(p=>{
    if(!q) return true;
    const hay=[displayName(p),subLine(p),...GROUP_FIELDS.map(k=>valOf(p,k))].join(" ");
    return hay.indexOf(q)>=0;
  }).map(p=>({
    name:displayName(p),
    dept:subLine(p),
    id:p._id
  }));
  const meItem=arr.filter(m=>m.id===meId);
  const others=arr.filter(m=>m.id!==meId);
  const final=meItem.concat(others);
  if(final.length===0) return `<div class="empty-note">未找到匹配的成员</div>`;
  return final.map(m=>`<div class="mem">
      <div class="mi">
        <div class="mn">${esc(m.name)} ${m.id===meId?'<span style="color:var(--brand)">●</span>':''}</div>
        <div class="md">${esc(m.dept)}</div>
      </div>
    </div>`).join("");
}
function filterMembers(q){
  const me=findMe(); const meId=me?me._id:null;
  const el=$("#memlist"); if(el) el.innerHTML=memListHtml(meId,q);
}

/* ============== 贴士 ============== */
function _tipBody(t){
  let body="";
  if(t.groups&&t.groups.length){
    body=t.groups.map(g=>`<div class="tip-cat">${esc(g.name)}</div>`+
      (g.items||[]).map(it=>`<div class="tip-item"><div class="ti-name">${esc(it.name)}</div>${it.detail?`<div class="ti-detail">${esc(it.detail)}</div>`:''}</div>`).join("")).join("");
  } else if(t.blocks&&t.blocks.length){
    body=t.blocks.map(b=> b.kind==="subtitle"
      ? `<div class="tip-sub">${esc(b.subtitle)}</div><div class="tip-body">${esc(b.text)}</div>`
      : `<div class="tip-body">${esc(b.text)}</div>`).join("");
  }
  return body;
}
function tipsView(){
  const isAdmin=ctx.role==="admin";
  if(isAdmin){
    if(!state.tips||!state.tips.length) return `<div class="hint">组织者视角：可随时修改、删除贴士，或新增一条。</div><button class="btn" onclick="addTip()">+ 新增贴士</button>`;
    let html=`<div class="hint">组织者视角：下方为贴士完整内容，每条可「改 / 删」，底部可新增。</div>`;
    state.tips.forEach((t,i)=>{
      html+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">📌 ${esc(t.title)}</h3><div><button class="mini" onclick="editTip(${i})">改</button> <button class="mini del" onclick="delTip(${i})">删</button></div></div>${_tipBody(t)}</div>`;
    });
    html+=`<button class="btn" onclick="addTip()">+ 新增贴士</button>`;
    return html;
  }
  if(!state.tips||!state.tips.length) return `<div class="empty-note">暂无贴士内容</div>`;
  return `<div class="hint">出行必看小贴士。建议出发前通读一遍。</div>`+
    state.tips.map(t=>`<div class="card"><h3>📌 ${esc(t.title)}</h3>${_tipBody(t)}</div>`).join("");
}

/* ============== 贴士：组织者改写/删除/新增 ============== */
let _tipBuf=null, _tipIdx=-1;
function delTip(i){confirmSheet('确定删除该贴士「'+(state.tips[i]?state.tips[i].title:'')+'」？',()=>{state.tips.splice(i,1);persist();render();});}
function addTip(){_tipIdx=-1;_tipBuf={title:'新贴士',type:'items',groups:[{name:'分类一',items:[{name:'',detail:''}]}],blocks:[]};_renderTipSheet();}
function editTip(i){_tipIdx=i;_tipBuf=JSON.parse(JSON.stringify(state.tips[i]));
  if(!_tipBuf.type)_tipBuf.type=(_tipBuf.groups&&_tipBuf.groups.length)?'items':((_tipBuf.blocks&&_tipBuf.blocks.length)?'blocks':'items');
  if(_tipBuf.type==='items'&&!_tipBuf.groups)_tipBuf.groups=[];
  if(_tipBuf.type==='blocks'&&!_tipBuf.blocks)_tipBuf.blocks=[];
  _renderTipSheet();}
function _syncTipBuf(){
  _tipBuf.title=document.querySelector('[data-tt="title"]').value;
  if(_tipBuf.type==='items'){
    _tipBuf.groups=[...document.querySelectorAll('.tip-cat-row')].map(cr=>{
      const name=cr.querySelector('[data-cn]').value;
      const items=[...cr.querySelectorAll('.tip-item-row')].map(ir=>({name:ir.querySelector('[data-in]').value,detail:ir.querySelector('[data-id]').value}));
      return {name,items};
    });
  } else {
    _tipBuf.blocks=[...document.querySelectorAll('.tip-block-row')].map(br=>{
      const kind=br.dataset.kind;
      if(kind==='subtitle')return{kind,subtitle:br.querySelector('[data-bs]').value,text:br.querySelector('[data-bt]').value};
      return{kind:'text',text:br.querySelector('[data-bt]').value};
    });
  }
}
function _renderTipSheet(){
  const t=_tipBuf;
  let inner=`<h3>编辑贴士</h3><div class="f-item"><label>标题</label><input data-tt="title" value="${esc(t.title)}"></div>`;
  if(t.type==='items'){
    inner+=`<div class="hint">分类与条目均可增删改</div>`;
    t.groups.forEach((g,gi)=>{
      inner+=`<div class="tip-cat-row" style="border:1px solid var(--line);border-radius:10px;padding:8px;margin:8px 0">
        <div style="display:flex;gap:6px;align-items:center"><input data-cn value="${esc(g.name)}" style="flex:1;font-weight:600"><button class="mini del" data-del-cat="${gi}">删分类</button></div>`;
      g.items.forEach((it,ii)=>{
        inner+=`<div class="tip-item-row" style="display:flex;gap:6px;margin-top:6px"><input data-in value="${esc(it.name)}" placeholder="名称" style="flex:1"><input data-id value="${esc(it.detail||'')}" placeholder="说明" style="flex:1.4"><button class="mini del" data-del-item="${gi}-${ii}">删</button></div>`;
      });
      inner+=`<button class="btn sm" data-add-item="${gi}" style="margin-top:6px">+ 添加条目</button></div>`;
    });
    inner+=`<button class="btn sm" data-add-cat style="margin-top:8px">+ 添加分类</button>`;
  } else {
    t.blocks.forEach((b,bi)=>{
      if(b.kind==='subtitle'){
        inner+=`<div class="tip-block-row" data-kind="subtitle" style="border:1px solid var(--line);border-radius:10px;padding:8px;margin:8px 0"><input data-bs value="${esc(b.subtitle||'')}" placeholder="小标题" style="font-weight:600"><textarea data-bt placeholder="正文">${esc(b.text||'')}</textarea><button class="mini del" data-del-block="${bi}">删</button></div>`;
      } else {
        inner+=`<div class="tip-block-row" data-kind="text" style="border:1px solid var(--line);border-radius:10px;padding:8px;margin:8px 0"><textarea data-bt placeholder="正文">${esc(b.text||'')}</textarea><button class="mini del" data-del-block="${bi}">删</button></div>`;
      }
    });
    inner+=`<button class="btn sm" data-add-block style="margin-top:8px">+ 添加正文</button>`;
  }
  inner+=`<button class="btn" onclick="saveTip()">保存</button><div style="height:8px"></div><button class="btn ghost" onclick="closeSheet()">取消</button>`;
  const m=$("#mask");
  if(m){ m.querySelector(".sheet").innerHTML=inner; }
  else { showSheet(inner); }
  document.querySelectorAll('[data-del-cat]').forEach(b=>b.onclick=()=>{_syncTipBuf();_tipBuf.groups.splice(+b.dataset.delCat,1);_renderTipSheet();});
  document.querySelectorAll('[data-del-item]').forEach(b=>b.onclick=()=>{_syncTipBuf();const a=b.dataset.delItem.split('-');_tipBuf.groups[+a[0]].items.splice(+a[1],1);_renderTipSheet();});
  document.querySelectorAll('[data-add-item]').forEach(b=>b.onclick=()=>{_syncTipBuf();_tipBuf.groups[+b.dataset.addItem].items.push({name:'',detail:''});_renderTipSheet();});
  document.querySelectorAll('[data-add-cat]').forEach(b=>b.onclick=()=>{_syncTipBuf();_tipBuf.groups.push({name:'新分类',items:[]});_renderTipSheet();});
  document.querySelectorAll('[data-del-block]').forEach(b=>b.onclick=()=>{_syncTipBuf();_tipBuf.blocks.splice(+b.dataset.delBlock,1);_renderTipSheet();});
  document.querySelectorAll('[data-add-block]').forEach(b=>b.onclick=()=>{_syncTipBuf();_tipBuf.blocks.push({kind:'text',text:''});_renderTipSheet();});
}
function saveTip(){
  _syncTipBuf();
  const copy=JSON.parse(JSON.stringify(_tipBuf));
  if(_tipIdx<0) state.tips.push(copy);
  else state.tips[_tipIdx]=copy;
  persist();closeSheet();render();
}

/* ============== 行程 ============== */
function scheduleRow(it){
  return `<div class="di"><div class="tt">${esc(it.start)}${it.end?'-'+esc(it.end):''} ${esc(it.act)}</div>${it.trans?`<div class="meta">🚗 ${esc(it.trans)}</div>`:""}</div>`;
}
function dayTabs(){
  return `<div class="daytabs">`+state.schedule.map((d,i)=>
    `<div class="dtab ${ctx.schedDay===i?'on':''}" onclick="goSchedDay(${i})"><div class="dw">${esc(d.week)}</div><div class="dd">${esc(d.date)}</div></div>`).join("")+`</div>`;
}
function goSchedDay(i){ctx.schedDay=i;render();}
function scheduleView(){
  const isAdmin=ctx.role==="admin";
  const ov=(state.overview||[]);
  const ovHtml = ov.length ? `<div class="card ov"><div class="ovh">🧭 行程概述 · 全程总览</div>`+
    ov.map(o=>`<div class="ovr"><span class="ovd">${esc(o.day)}</span><span class="ovrt">${esc(o.route)}</span><span class="ovk">${esc(o.km)}</span></div>`).join("")+`</div>` : "";
  // 防崩溃：行程为空或数据异常时给出友好提示，而非整页卡死
  if(!state.schedule || !state.schedule.length){
    return ovHtml + `<div class="empty-note" style="padding:40px 20px">📭 暂无行程数据<br><span style="font-size:12px;color:#94a3b8">组织者可在后台「数据后台」手动添加，或重新生成时上传行程表。</span></div>` + tabbar();
  }
  if(ctx.schedDay==null||ctx.schedDay>=state.schedule.length)ctx.schedDay=0;
  const d=state.schedule[ctx.schedDay];
  if(!d || !d.items) return ovHtml + `<div class="empty-note">行程数据异常</div>` + tabbar();
  const tabs=dayTabs();
  if(isAdmin){
    const items=d.items.map((it,i)=>`<div class="di"><div class="tt">${esc(it.start)}${it.end?'-'+esc(it.end):''} ${esc(it.act)}</div>${it.trans?`<div class="meta">🚗 ${esc(it.trans)}</div>`:''}<div style="margin-top:6px"><button class="mini" onclick="editSchedItem(${ctx.schedDay},${i})">改</button> <button class="mini del" onclick="delSchedItem(${ctx.schedDay},${i})">删</button></div></div>`).join("");
    const dayHtml=`<div class="day"><div class="dh">${esc(d.date)} ${esc(d.week)} · ${esc(d.title)}
      <span style="float:right"><button class="mini" onclick="editSchedDay(${ctx.schedDay})">改整天</button>
      <button class="mini del" onclick="delSchedDay(${ctx.schedDay})">删</button></span></div>
      ${items}${d.tip?`<div class="di"><div class="tip">⚠️ ${esc(d.tip)}</div></div>`:''}
      <div style="padding:10px 14px"><button class="btn sm" onclick="addSchedItem(${ctx.schedDay})">+ 新增时段</button></div></div>`;
    return ovHtml+tabs+dayHtml+`<button class="btn" onclick="editSchedDay(-1)">+ 新增一天行程</button>`;
  }
  return ovHtml+tabs+`<div class="day"><div class="dh">${esc(d.date)} ${esc(d.week)} · ${esc(d.title)}</div>${d.items.map(scheduleRow).join("")}${d.tip?`<div class="di"><div class="tip">⚠️ ${esc(d.tip)}</div></div>`:''}</div>`;
}
function editSchedDay(di){
  const d = di<0?{date:'',week:'',title:'',tip:''}:state.schedule[di];
  const hf=(k,lab)=>`<div class="f-item"><label>${lab}</label><input data-sk="${k}" value="${esc(d[k]||'')}"></div>`;
  showSheet(`<h3>${di<0?'新增行程日':'编辑当日信息'}</h3>${hf('week','第几天（如 D1）')}${hf('date','日期（如 11月08日）')}${hf('title','当日主题 / 路线')}${hf('tip','注意事项')}<button class="btn" onclick="saveSchedDay(${di})">保存</button><div style="height:8px"></div><button class="btn ghost" onclick="closeSheet()">取消</button>`);
}
function saveSchedDay(di){
  const o = di<0?{items:[]}:state.schedule[di];
  ['week','date','title','tip'].forEach(k=>{o[k]=document.querySelector('[data-sk="'+k+'"]').value.trim();});
  if(di<0)state.schedule.push(o);
  persist();closeSheet();render();
}
function editSchedItem(di,ii){
  const it=state.schedule[di].items[ii];
  const hf=(k,lab)=>`<div class="f-item"><label>${lab}</label><input data-ik="${k}" value="${esc(it[k]||'')}"></div>`;
  showSheet(`<h3>编辑时段</h3>${hf('start','开始时间')}${hf('end','结束时间')}${hf('act','事项')}${hf('trans','交通方式')}<button class="btn" onclick="saveSchedItem(${di},${ii})">保存</button><div style="height:8px"></div><button class="btn ghost" onclick="closeSheet()">取消</button>`);
}
function saveSchedItem(di,ii){
  const it=state.schedule[di].items[ii];
  ['start','end','act','trans'].forEach(k=>{it[k]=document.querySelector('[data-ik="'+k+'"]').value.trim();});
  persist();closeSheet();render();
}
function addSchedItem(di){
  state.schedule[di].items.push({start:'',end:'',act:'',trans:''});
  persist();editSchedItem(di,state.schedule[di].items.length-1);
}
function delSchedItem(di,ii){confirmSheet('确定删除此时段？',()=>{state.schedule[di].items.splice(ii,1);persist();render();});}
function delSchedDay(di){confirmSheet('确定删除该行程日？',()=>{state.schedule.splice(di,1);persist();render();});}

/* ============== 分组（通用·按 GROUP_FIELDS） ============== */
function groupsView(){
  const isAdmin=ctx.role==="admin"; const me=isAdmin?null:findMe();
  const gf=(GROUP_FIELDS||[]).filter(k=> state.people.some(p=>valOf(p,k)));
  if(gf.length===0) return `<div class="empty-note">尚未设置分组字段（生成时未包含分组列）</div>`;
  if(ctx.groupIdx==null||ctx.groupIdx>=gf.length)ctx.groupIdx=0;
  const k=gf[ctx.groupIdx];
  const by={};
  state.people.forEach(p=>{const v=valOf(p,k)||"未分组";(by[v]=by[v]||[]).push(p);});
  const tabs=`<div class="daytabs">`+gf.map((g,i)=>
    `<div class="dtab ${ctx.groupIdx===i?'on':''}" onclick="goGroupTab(${i})"><div class="dw">${esc(g)}</div><div class="dd">${state.people.filter(p=>valOf(p,g)).length}人</div></div>`).join("")+`</div>`;
  const groupsHtml=Object.keys(by).sort().map(g=>`
    <div class="grp"><div class="gh">${g==='未分组'?g:esc(g)} (${by[g].length}人)</div>
    <div class="gm">${by[g].map(p=>{const id=state.people.indexOf(p);return `<span class="m ${!isAdmin&&me&&p._id===me._id?'me':''}" ${isAdmin?`onclick="editGroup(${id})" style="cursor:pointer"`:''}>${esc(displayName(p))}</span>`;}).join("")}</div>
    ${isAdmin&&g!=='未分组'?`<div style="margin-top:6px"><button class="mini" onclick="editGroupMembers('${esc(k)}','${esc(g)}')">调整成员</button> <button class="mini del" onclick="delGroupCat('${esc(k)}','${esc(g)}')">删除分组</button></div>`:''}</div>`).join("");
  const tip = isAdmin?`<div class="hint">组织者视角：点任意成员可调整其${gf.map(x=>"「"+x+"」").join("")}；每个分组可「修改」名称或「删除」（成员回到未分组）。切换上方标签查看不同分组维度。</div>`:"";
  return tabs+tip+groupsHtml;
}
function goGroupTab(i){ctx.groupIdx=i;render();}
function editGroup(idx){

function saveGroup(idx){

  persist();closeSheet();render();
}
function editGroupMembers(field, groupName){
  const inner=`<h3>调整分组：「${esc(groupName)}」</h3>
    <div class="hint">点击下方成员可加入 / 移出本分组（高亮=已在本组）。改名请在下方输入后点保存。</div>
    <div class="mtwrap" style="display:flex;flex-wrap:wrap;gap:8px;margin:10px 0">`+
    state.people.map((p,idx)=>{
       const inG=(valOf(p,field)||"未分组")===groupName;
       return `<span class="mtoggle ${inG?'on':''}" data-pidx="${idx}" data-field="${esc(field)}" data-group="${esc(groupName)}" style="padding:6px 11px;border-radius:999px;border:1px solid var(--line);font-size:14px;cursor:pointer;${inG?'background:var(--brand);color:#fff;border-color:var(--brand)':''}">${esc(displayName(p))}</span>`;
    }).join("")+`</div>
    <div class="f-item" style="margin-top:4px"><label>改名此分组（可选）</label><input data-gcn3 value="${esc(groupName)}"></div>
    <button class="btn sm" onclick="saveGroupRename('${esc(field)}','${esc(groupName)}')">保存改名</button>
    <div style="height:10px"></div>
    <button class="btn ghost" onclick="closeSheet()">完成</button>`;
  showSheet(inner);
  document.querySelectorAll('.mtoggle').forEach(b=>b.onclick=()=>{
    const idx=+b.dataset.pidx, f=b.dataset.field, g=b.dataset.group;
    const p=state.people[idx];
    if((valOf(p,f)||"未分组")===g){
      p[f]=""; b.classList.remove('on'); b.style.background='';b.style.color='';b.style.borderColor='';
    } else {
      p[f]=g; b.classList.add('on'); b.style.background='var(--brand)';b.style.color='#fff';b.style.borderColor='var(--brand)';
    }
    persist();
  });
}
function saveGroupRename(field, oldName){
  const el=document.querySelector('[data-gcn3]'); if(!el)return;
  const nv=el.value.trim(); if(!nv){toast("名称不能为空");return;}
  if(nv!==oldName) state.people.forEach(p=>{if((valOf(p,field)||"未分组")===oldName)p[field]=nv;});
  persist();closeSheet();render();toast("已更新分组 ✅");
}
function delGroupCat(field,oldName){
  const cnt=state.people.filter(p=>(valOf(p,field)||"未分组")===oldName).length;
  confirmSheet('删除分组「'+oldName+'」？该组 '+cnt+' 人将回到「未分组」（成员本身不会被删除）。',()=>{
    state.people.forEach(p=>{if((valOf(p,field)||"未分组")===oldName)p[field]="";});
    persist();render();toast("已删除该分组 ✅");
  });
}

function editNotice(idx){

  const n=isNew?{title:'',content:'',time:new Date().toLocaleString('zh-CN'),author:'组织者',level:'普通'}:state.notices[idx];

function delNotice(idx){confirmSheet('确定删除该公告？',()=>{state.notices.splice(idx,1);persist();render();});}

/* ============== ADMIN: 数据后台 ============== */
function adminHome(){return adminTable();}

  const flds=state.fields;
  const total=state.people.length;
  let head=`<th class="name-col">${esc(NAME_FIELD||"姓名")}</th>`+flds.filter(f=>f.key!==NAME_FIELD).map(f=>`<th>${esc(f.label)}</th>`).join("")+`<th>操作</th>`;

    flds.filter(f=>f.key!==NAME_FIELD).forEach(f=>{
      let v=valOf(p,f.key);

      tds+=`<td title="${esc(v)}">${v?esc(v.length>16?v.slice(0,16)+'…':v):'<span style="color:#cbd5e1">—</span>'}</td>`;

  }).join("");
  const syncHint = SYNC_ENABLED
    ? `<div class="hint">📡 改完信息后点右上角「📤 同步」按钮，把链接发到群，大家点开就自动同步你的最新安排（数据不经服务器、自动剔除敏感字段）。</div>`
    : `<div class="hint">⚠️ 本小程序未配置同步后台，数据仅保存在本机。</div>`;

  <div class="tbl-wrap"><table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;

function delPerson(idx){
  confirmSheet('确定删除 '+(displayName(state.people[idx])||"该人员")+'？',()=>{state.people.splice(idx,1);persist();render();});
}
function editPerson(idx){
  const isNew = idx<0;
  const p = isNew ? Object.fromEntries(state.fields.map(f=>[f.key,""])) : state.people[idx];
  if(isNew) p._id="new"+Date.now();
  const bymod={};
  state.fields.forEach(f=>{(bymod[f.module]=bymod[f.module]||[]).push(f);});
  let inner=`<h3>${isNew?"新增人员":"编辑："+esc(displayName(p))}</h3>`;

    inner+=`<div class="grpttl">${esc(m)}</div>`;
    bymod[m].forEach(f=>{

        <input data-ek="${f.key}" value="${esc(valOf(p,f.key))}"></div>`;
    });
  });
  inner+=`<button class="btn" onclick="savePerson(${idx})">保存</button>
    <div style="height:8px"></div><button class="btn ghost" onclick="closeSheet()">取消</button>`;

  mask.innerHTML=`<div class="sheet">${inner}</div>`;

  document.body.appendChild(mask);

function closeSheet(){const m=$("#mask");if(m)m.remove();render();}
function showSheet(inner){
  closeSheet();
  const mask=document.createElement("div");mask.className="mask";mask.id="mask";
  mask.innerHTML=`<div class="sheet">${inner}</div>`;
  mask.onclick=(e)=>{if(e.target===mask)closeSheet();};
  document.body.appendChild(mask);
}
let _confirmCb=null;
function confirmSheet(msg, cb){
  _confirmCb=cb;
  const inner=`<h3>请确认</h3><div style="font-size:14px;margin:12px 0;color:#374151">${esc(msg)}</div>
    <button class="btn" onclick="doConfirm()">确定</button>
    <div style="height:8px"></div><button class="btn ghost" onclick="closeSheet()">取消</button>`;
  showSheet(inner);
}
function doConfirm(){const cb=_confirmCb;_confirmCb=null;closeSheet();if(cb)cb();}
function savePerson(idx){
  const obj = idx<0 ? window._newObj : state.people[idx];
  document.querySelectorAll('[data-ek]').forEach(el=>{obj[el.dataset.ek]=el.value.trim();});
  if(idx<0) state.people.push(obj);
  persist(); closeSheet(); render();
}



/* ============== 同步（短链模式：数据存组织者自己的仓库） ============== */
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";t.style.cssText="position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:rgba(17,24,39,.92);color:#fff;padding:10px 16px;border-radius:22px;font-size:13px;z-index:99;max-width:90vw;text-align:center;transition:opacity .3s";document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity="1";
  clearTimeout(t._tm); t._tm=setTimeout(()=>{t.style.opacity="0";},2200);
}
async function copyTextAsync(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    try{ await navigator.clipboard.writeText(text); return true; }catch(e){}
  }
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.cssText="position:fixed;left:-9999px;top:0;opacity:0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{ document.execCommand("copy"); return true; }catch(e){ return false; }
  finally{ ta.remove(); }
}
const SYNC_API = "https://api.github.com/repos/" + SYNC_REPO + "/contents/" + SYNC_FILE;
async function genSyncLink(){
  const SENS=["手机号","身份证号","手机","电话","身份证"];
  const peopleForSync=state.people.map(p=>{const o=Object.assign({},p);SENS.forEach(k=>{ if(o[k]!==undefined) o[k]=""; });return o;});
  const payload={people:peopleForSync, schedule:state.schedule, notices:state.notices, tips:state.tips, overview:state.overview, _ts:Date.now()};

  showSheet(`
    <h3>📤 正在同步...</h3>
    <div style="text-align:center;padding:20px 0">
      <div style="display:inline-block;width:32px;height:32px;border:3px solid #93c5fd;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <div style="margin-top:10px;font-size:13px;color:#6b7280">正在把数据上传到云端...</div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <div id="sync-result"></div>
  `);

  try{
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    let sha = "";
    try{
      const r = await fetch(SYNC_API, {headers:{Authorization:"Bearer "+GITHUB_SYNC_TOKEN}});
      if(r.ok){ const d = await r.json(); sha = d.sha; }
    }catch(e){}

    const body = {message:"sync: "+new Date().toLocaleString('zh-CN'), content:content, branch:SYNC_BRANCH};
    if(sha) body.sha = sha;

    const wr = await fetch(SYNC_API, {
      method: "PUT",
      headers:{Authorization:"Bearer "+GITHUB_SYNC_TOKEN, "Accept":"application/vnd.github+json", "Content-Type":"application/json"},
      body:JSON.stringify(body)
    });

    if(!wr.ok){
      const errText = await wr.text().catch(()=>"未知错误");
      throw new Error("GitHub API 返回 "+wr.status+": "+errText.slice(0,200));
    }

    document.getElementById("sync-result").innerHTML = `
      <div style="text-align:center;padding:10px 0 16px">
        <div style="font-size:40px;line-height:1">✅</div>
        <div style="color:#059669;font-size:15px;font-weight:600;margin-top:8px">已同步到云端！</div>
        <div style="font-size:13px;color:#6b7280;margin-top:6px">伙伴刷新页面（或等待自动刷新）即可看到更新</div>
      </div>
      <button class="btn ghost" onclick="closeSheet()">关闭</button>
    `;
  }catch(e){
    document.getElementById("sync-result").innerHTML = `
      <div style="color:#dc2626;font-size:14px;margin-bottom:8px">❌ 上传失败</div>
      <div style="font-size:12px;color:#6b7280;background:#fef2f2;padding:8px;border-radius:8px">${esc(e.message||"网络错误")}</div>
      <div class="hint" style="margin-top:8px;text-align:left">
        可能的原因：<br>
        • 网络不通（检查手机是否联网）<br>
        • 同步令牌无效 / 仓库名写错（需在生成时填对你自己的仓库+令牌）<br>
        • GitHub 服务暂时不可用<br>
        <br>请稍后重试。
      </div>
      <div style="height:8px"></div>
      <button class="btn ghost" onclick="closeSheet()">关闭</button>
    `;
  }
}
async function doCopyShortLink(){
  const url = document.getElementById("sync-short-url").textContent;
  if(!url){toast("没有可复制的链接");return;}
  const ok = await copyTextAsync(url);
  toast(ok ? "已复制链接 ✅（去微信粘贴发送吧）" : "复制失败，请手动长按上方链接复制");
}
async function fetchJsonFrom(url, headers){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),8000);
  try{
    const r=await fetch(url,{headers:headers||{},cache:"no-store",signal:ctrl.signal});
    if(!r.ok) throw new Error("HTTP "+r.status);
    return await r.json();
  }finally{ clearTimeout(tid); }
}
function decodeBase64Json(b64){
  return JSON.parse(decodeURIComponent(escape(atob(b64.replace(/\s/g,"")))));
}
async function fetchSyncJson(){
  const parts=SYNC_REPO.split("/"); const owner=parts[0]; const repoName=parts[1];
  // ① GitHub API：即时反映最新提交，CORS:*，无 CDN 延迟
  try{
    const u="https://api.github.com/repos/"+SYNC_REPO+"/contents/"+SYNC_FILE+"?ref="+encodeURIComponent(SYNC_BRANCH);
    const d=await fetchJsonFrom(u,{Authorization:"Bearer "+GITHUB_SYNC_TOKEN,Accept:"application/vnd.github+json"});
    if(d&&d.content) return decodeBase64Json(d.content);
  }catch(e){}
  // ② raw.githubusercontent.com：即时，CORS:*
  try{
    const u="https://raw.githubusercontent.com/"+SYNC_REPO+"/"+SYNC_BRANCH+"/"+SYNC_FILE;
    const d=await fetchJsonFrom(u);
    if(d) return d;
  }catch(e){}
  // ③ 同域 Pages：最兼容微信，但 CDN 最长 10 分钟
  const base=(repoName===owner+".github.io")?("https://"+owner+".github.io"):("https://"+owner+".github.io/"+repoName);
  return await fetchJsonFrom(base+"/"+SYNC_FILE+"?_t="+Date.now());
}
const SENS_FIELDS=["手机号","身份证号","手机","电话","身份证"];
function mergeSyncData(data){
  if(data.people && data.people.length){
    const localMap=new Map(state.people.map(p=>[p._id,p]));
    state.people=data.people.map(p=>{
      const local=localMap.get(p._id);
      if(local){ SENS_FIELDS.forEach(k=>{ if(!p[k] && local[k]) p[k]=local[k]; }); }
      return p;
    });
  }
  // 仅当云端该板块确有内容时才覆盖，避免空数组把本地数据清空
  if(data.schedule && data.schedule.length) state.schedule=data.schedule;
  if(data.notices && data.notices.length) state.notices=data.notices;
  if(data.tips && data.tips.length) state.tips=data.tips;
  if(data.overview && data.overview.length) state.overview=data.overview;
  persist();
}
let _lastSyncTs=0;
async function silentSync(){
  try{
    const data=await fetchSyncJson();
    if(data && data._ts && data._ts!==_lastSyncTs){
      const changed=(_lastSyncTs!==0);
      mergeSyncData(data);
      _lastSyncTs=data._ts;
      if(changed) toast("已同步最新安排 ✅");
    }
  }catch(e){ /* 静默失败，不阻塞页面 */ }
}
async function applyRemoteSync(){
  const overlay = document.createElement("div");
  overlay.id = "sync-overlay";
  overlay.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center";
  overlay.innerHTML = `
    <div style="width:36px;height:36px;border:3.5px solid #93c5fd;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite"></div>
    <div style="margin-top:16px;font-size:15px;color:#374151;font-weight:500">正在同步最新数据...</div>
    <div style="margin-top:6px;font-size:12px;color:#9ca3af">从组织者仓库获取最新安排</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  `;
  document.body.appendChild(overlay);
  try{
    const data = await fetchSyncJson();
    mergeSyncData(data);
    _lastSyncTs = data._ts || _lastSyncTs;
    overlay.innerHTML = `
      <div style="font-size:40px">✅</div>
      <div style="margin-top:12px;font-size:16px;color:#059669;font-weight:600">同步完成！</div>
      <div style="margin-top:4px;font-size:13px;color:#6b7280">已获取组织者最新安排</div>
    `;
    setTimeout(() => {
      const ov = document.getElementById("sync-overlay");
      if(ov) ov.remove();
      if(ctx.role) render(); else renderSplash();
    }, 1200);
  }catch(e){
    overlay.innerHTML = `
      <div style="font-size:36px">⚠️</div>
      <div style="margin-top:12px;font-size:15px;color:#dc2626;font-weight:600">同步失败</div>
      <div style="margin-top:6px;font-size:12px;color:#6b7280;max-width:280px;text-align:center">${esc(e.message||"无法连接服务器")}</div>
      <div style="margin-top:16px">
        <button class="btn" onclick="manualResync()">重试</button>
        <button class="btn ghost" onclick="(function(){var ov=document.getElementById('sync-overlay');if(ov)ov.remove();if(ctx.role)render();else renderSplash();})()">进入网页</button>
      </div>
    `;
  }
}
async function manualResync(){
  if(!SYNC_ENABLED){ toast("该小程序未配置同步后台"); return; }
  await applyRemoteSync();
}
let _autoTimer=null;
function startAutoRefresh(){
  if(_autoTimer) clearInterval(_autoTimer);
  if(!SYNC_ENABLED) return;
  _autoTimer=setInterval(async ()=>{
    try{
      const data=await fetchSyncJson();
      if(data && data._ts && data._ts!==_lastSyncTs){
        mergeSyncData(data); _lastSyncTs=data._ts;
        if(ctx.role) render();
        toast("已同步组织者最新更新 ✅");
      }
    }catch(e){}
  }, 45000);
}
async function init(){
  const params = new URLSearchParams(location.search);
  if(params.get("s") === "1"){
    try{ history.replaceState(null,"",location.pathname); }catch(e){}
  }
  const h=location.hash||"";
  const m=h.match(/#sync=(.+)$/);
  if(m){ toast("⚠️ 这是旧版同步链接，可能已失效。请组织者重新生成。"); try{ history.replaceState(null,"",location.pathname); }catch(e){} }
  if(SYNC_ENABLED){
    // 单链接自动同步：进入即拉取最新，后台定时刷新（组织者改完参与者自动更新）
    silentSync().then(()=>{ if(ctx.role) render(); });
    startAutoRefresh();
  } else if(params.get("s") === "1"){
    toast("该小程序未配置同步后台");
  }
  renderSplash();
}
init();
</script>
