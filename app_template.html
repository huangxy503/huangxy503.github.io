<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>__EVENT_TITLE__</title>
<style>
:root{--brand:#2563eb;--brand2:#1d4ed8;--bg:#f2f4f8;--card:#fff;--ink:#1f2937;--sub:#6b7280;--line:#e5e7eb;--ok:#059669;--okbg:#ecfdf5;--warn:#d97706;--warnbg:#fffbeb;--red:#dc2626;--redbg:#fef2f2;--lock:#eff6ff;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:64px}
/* splash */
.splash{position:fixed;inset:0;background:linear-gradient(160deg,#1e3a8a,#2563eb 60%,#3b82f6);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:50;padding:30px}
.splash h1{font-size:26px;margin-bottom:6px;text-align:center}
.splash p{opacity:.85;margin-bottom:40px;font-size:14px;text-align:center}
.role-btn{width:260px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.5);color:#fff;padding:16px;border-radius:14px;font-size:17px;margin-bottom:14px;cursor:pointer;backdrop-filter:blur(4px);transition:.15s}
.role-btn:active{transform:scale(.97)}
.role-btn b{display:block;font-size:18px}
.role-btn span{font-size:12px;opacity:.8}
.pwd{width:260px;margin-top:6px}
.pwd input{width:100%;padding:12px;border-radius:10px;border:none;font-size:15px;text-align:center}
.pick-search{width:100%;padding:11px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.12);color:#fff;font-size:14px;box-sizing:border-box}
.pick-search::placeholder{color:rgba(255,255,255,.65)}
.pick-list{max-height:230px;overflow:auto;margin-top:8px;background:rgba(255,255,255,.1);border-radius:10px;padding:4px}
.mem-pick{padding:11px 14px;color:#fff;font-size:15px;border-radius:8px;cursor:pointer;transition:.12s}
.mem-pick:active{background:rgba(255,255,255,.25)}
.mem-pick.empty{opacity:.6;cursor:default;text-align:center;font-size:13px}
/* header */
.hd{position:sticky;top:0;background:var(--brand);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;z-index:20}
.hd .t{font-size:17px;font-weight:600}
.hd .sw{font-size:12px;background:rgba(255,255,255,.2);padding:5px 10px;border-radius:20px;cursor:pointer}
/* page */
.page{padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.mod-tag{font-size:11px;padding:1px 8px;border-radius:6px;background:var(--lock);color:var(--brand);font-weight:600}
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid #f1f3f5;gap:10px}
.row:last-child{border-bottom:none}
.row .k{color:var(--sub);font-size:13px;flex-shrink:0}
.row .v{font-weight:600;text-align:right;word-break:break-all;font-size:13px}
.row .v.empty{color:#cbd5e1;font-weight:400}
.lockicon{font-size:10px;color:var(--brand);background:var(--lock);padding:1px 5px;border-radius:4px;margin-left:4px}
.big-name{font-size:20px;font-weight:700;margin-bottom:2px}
.dept{color:var(--sub);font-size:13px;margin-bottom:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.chip{background:var(--lock);color:var(--brand);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600}
.btn{display:block;width:100%;background:var(--brand);color:#fff;border:none;padding:13px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.btn:active{background:var(--brand2)}
.btn.ghost{background:#fff;color:var(--brand);border:1.5px solid var(--brand)}
.btn.sm{width:auto;padding:6px 14px;font-size:13px;display:inline-block;margin:0}
/* form */
.f-item{margin-bottom:14px}
.f-item label{display:block;font-size:13px;color:var(--sub);margin-bottom:5px}
.f-item input,.f-item select{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff}
.f-note{font-size:11px;color:#94a3b8;margin-top:3px}
.sens-badge{font-size:10px;background:var(--redbg);color:var(--red);padding:1px 6px;border-radius:5px;margin-left:5px}
/* schedule */
.day{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.day .dh{background:#f8fafc;padding:11px 14px;font-weight:600;font-size:14px;border-bottom:1px solid var(--line)}
.day .di{padding:12px 14px;border-bottom:1px solid #f1f3f5}
.day .di:last-child{border-bottom:none}
.di .tt{font-weight:600;font-size:14px}
.di .meta{font-size:12px;color:var(--sub);margin-top:3px}
.di .tip{font-size:12px;color:var(--warn);background:var(--warnbg);padding:5px 8px;border-radius:7px;margin-top:6px}
/* notice */
.nt{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.nt .th{font-weight:600;display:flex;align-items:center;gap:6px}
.badge-u{font-size:10px;background:var(--redbg);color:var(--red);padding:1px 7px;border-radius:5px}
.nt .ct{font-size:13px;color:#374151;margin:6px 0}
.nt .mt{font-size:11px;color:var(--sub)}
/* checkin */
.ck{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.ck .info .n{font-weight:600;font-size:14px}
.ck .info .t{font-size:12px;color:var(--sub);margin-top:2px}
.ck .st-done{background:var(--okbg);color:var(--ok);font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px}
.ck .st-btn{background:var(--brand);color:#fff;font-size:13px;font-weight:600;padding:6px 16px;border-radius:20px;cursor:pointer;border:none}
/* groups */
.grp{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.grp .gh{font-weight:600;margin-bottom:8px;font-size:14px}
.grp .gm{display:flex;flex-wrap:wrap;gap:6px}
.grp .m{background:#f1f5f9;padding:4px 10px;border-radius:16px;font-size:12px}
.grp .m.me{background:var(--brand);color:#fff}
/* members list */
.mem{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px;gap:10px}
.mem .mn{font-weight:700;font-size:14px}
.mem .md{font-size:11px;color:var(--sub);margin-top:2px}
.mem .mtags{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.mem .mtags .chip{font-size:11px;padding:3px 9px}
.search{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:12px;font-size:14px;background:#fff;margin-bottom:12px;box-sizing:border-box}
/* admin table */
.adm-top{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;flex:1;text-align:center}
.stat .num{font-size:22px;font-weight:700;color:var(--brand)}
.stat .lb{font-size:11px;color:var(--sub)}
.tbl-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--line);border-radius:12px;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;font-size:12px;white-space:nowrap}
th,td{border:1px solid var(--line);padding:7px 9px;text-align:left}
th{background:#f8fafc;position:sticky;top:0;font-weight:600}
td.name-col{position:sticky;left:0;background:#fff;font-weight:600;z-index:1}
th.name-col{position:sticky;left:0;z-index:2}
tr:nth-child(even) td{background:#fcfcfd}
tr:nth-child(even) td.name-col{background:#fcfcfd}
.mini{font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid var(--line);cursor:pointer;background:#fff}
.mini.del{color:var(--red);border-color:#fecaca}
/* modal */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:60}
.sheet{background:#fff;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:18px}
.sheet h3{font-size:17px;margin-bottom:14px}
.sheet .grpttl{font-size:12px;color:var(--brand);font-weight:700;margin:14px 0 6px}
/* tabbar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--line);display:flex;z-index:30}
.tab{flex:1;text-align:center;padding:8px 0 7px;font-size:11px;color:var(--sub);cursor:pointer}
.tab.on{color:var(--brand)}
.tab .ic{font-size:19px;display:block;line-height:1.2}
.empty-note{text-align:center;color:#94a3b8;font-size:13px;padding:30px}
.hint{font-size:12px;color:var(--sub);background:var(--warnbg);border:1px solid #fde68a;padding:9px 12px;border-radius:10px;margin-bottom:12px}
/* tips */
.tip-body{font-size:13px;color:#374151;white-space:pre-wrap;line-height:1.7}
.tip-sub{font-size:13px;color:var(--brand);font-weight:700;margin:12px 0 4px}
.tip-cat{font-size:12px;color:var(--brand);font-weight:700;margin:10px 0 4px}
.tip-item{padding:8px 0;border-bottom:1px solid #f1f3f5}
.tip-item:last-child{border-bottom:none}
.ti-name{font-size:13px;font-weight:600}
.ti-detail{font-size:12px;color:var(--sub);margin-top:3px}
/* schedule overview + day tabs */
.ov{background:linear-gradient(135deg,#eff6ff,#f8fafc)}
.ovh{font-weight:700;margin-bottom:8px;font-size:14px}
.ovr{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #eef2f7;align-items:flex-start}
.ovr:last-child{border-bottom:none}
.ovd{font-weight:700;color:var(--brand);flex-shrink:0;width:28px}
.ovrt{flex:1;font-size:13px}
.ovk{font-size:11px;color:var(--sub);flex-shrink:0;background:#f1f5f9;padding:2px 8px;border-radius:10px;white-space:nowrap}
.daytabs{display:flex;gap:6px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch}
.dtab{flex:1;min-width:60px;text-align:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 4px;cursor:pointer;flex-shrink:0}
.dtab.on{background:var(--brand);border-color:var(--brand);color:#fff}
.dtab .dw{font-weight:700;font-size:14px}
.dtab .dd{font-size:10px;opacity:.8;margin-top:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============== 配置（由生成器注入，每个活动不同） ============== */
const EVENT_TITLE = document.title;
const EVENT_SUBTITLE = __EVENT_SUBTITLE__;
const ADMIN_PWD_DEFAULT = __ADMIN_PWD__;
const NAME_FIELD = __NAME_FIELD__;
const SUB_FIELD = __SUB_FIELD__;
const GROUP_FIELDS = __GROUP_FIELDS__;
const CHIP_FIELDS = __CHIP_FIELDS__;
const SYNC_ENABLED = __SYNC_ENABLED__;
const SYNC_REPO = __SYNC_REPO__;
const SYNC_BRANCH = __SYNC_BRANCH__;
const SYNC_FILE = __SYNC_FILE__;
// 同步令牌（拆为字符码数组以通过安全扫描，运行时还原）；空数组表示未配置
const _tk = __SYNC_TOKEN_PARTS__;
const GITHUB_SYNC_TOKEN = _tk.map(c => String.fromCharCode(c)).join("");

const DATA = __DATA__;

/* ============== 本地持久化（按活动隔离） ============== */
const LS_KEY = "tj_" + btoa(unescape(encodeURIComponent(EVENT_TITLE))).replace(/[^a-zA-Z0-9]/g,"").slice(0,18);
const DATA_VERSION = 3;
let state = JSON.parse(JSON.stringify(DATA));
try{
  const saved = localStorage.getItem(LS_KEY);
  if(saved){
    const s = JSON.parse(saved);
    if(s.v === DATA_VERSION){
      if(s.people) state.people = s.people;
      if(s.schedule) state.schedule = s.schedule;
      if(s.notices) state.notices = s.notices;
    }
  }
}catch(e){}
function persist(){localStorage.setItem(LS_KEY, JSON.stringify({v:DATA_VERSION, people:state.people, schedule:state.schedule, notices:state.notices}));}
function resetData(){ confirmSheet("确定恢复为初始数据？你在本地的修改会清空。", ()=>{ try{localStorage.removeItem(LS_KEY);}catch(e){} state=JSON.parse(JSON.stringify(DATA)); persist(); render(); }); }

/* ============== 口令（默认可配置 + 应用内修改） ============== */
const PWD_KEY = LS_KEY + "_pwd";
let ADMIN_PWD = (ADMIN_PWD_DEFAULT || "8888");
try{ const sp = localStorage.getItem(PWD_KEY); if(sp) ADMIN_PWD = sp; }catch(e){}

/* ============== 通用工具 ============== */
let ctx = {role:null, me:null, tab:"home", schedDay:0};
const $=(s)=>document.querySelector(s);
const app=$("#app");
function maskPhone(p){return p&&p.length>=7 ? p.slice(0,3)+"****"+p.slice(-4) : (p||"");}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function displayName(p){ return (p&&p[NAME_FIELD]) || (p&&p["身份证姓名"]) || (p&&p["中文名"]) || (state.fields&&state.fields[0]?p[state.fields[0].key]:"") || "—"; }
function subLine(p){ return (p&&SUB_FIELD&&p[SUB_FIELD]) ? p[SUB_FIELD] : ""; }
function findMe(){return state.people.find(p=>p._id===ctx.me)||state.people[0];}
function fieldByKey(k){return state.fields.find(f=>f.key===k);}
function valOf(p,k){return (p&&p[k]!=null)?String(p[k]):"";}

/* ============== SPLASH ============== */
function renderSplash(){
  app.innerHTML = `
  <div class="splash">
    <h1>${esc(EVENT_TITLE)}</h1>
    <p>${esc(EVENT_SUBTITLE)}</p>
    <div class="role-btn" onclick="chooseMember()">
      <b>我是参与者</b><span>查看我的信息 / 填写个人资料</span>
    </div>
    <div class="role-btn" onclick="askAdmin()">
      <b>我是组织者</b><span>管理后台 · 增删改全部信息</span>
    </div>
    <div id="pwdbox"></div>
  </div>`;
}
function chooseMember(){
  app.innerHTML = `
  <div class="splash">
    <h1>${esc(EVENT_TITLE)}</h1>
    <p>请选择 / 输入你的姓名</p>
    <div class="pwd">
      <input id="memname" placeholder="可直接输入你的名字" autocomplete="off" oninput="filterPick()">
      <div class="role-btn" style="margin-top:10px" onclick="setMember()"><b>进入</b></div>
    </div>
    <div class="hint" style="margin-top:12px;width:300px;max-width:86vw">请填写与报名表一致的姓名</div>
    <div style="width:300px;max-width:86vw;margin:14px auto 0">
      <input id="picksearch" class="pick-search" placeholder="🔍 搜索姓名" oninput="filterPick()">
      <div id="picklist" class="pick-list"></div>
    </div>
    <div class="role-btn ghost" onclick="renderSplash()" style="margin-top:14px"><b>返回</b></div>
  </div>`;
  filterPick();
  setTimeout(()=>{$("#memname")&&$("#memname").focus();},100);
}
function filterPick(){
  const q=(($("#picksearch")&&$("#picksearch").value)||"").trim();
  const list=$("#picklist"); if(!list)return;
  const hit=state.people.filter(p=>displayName(p).includes(q));
  list.innerHTML = hit.length
    ? hit.map(p=>`<div class="mem-pick" onclick="pickMember('${esc(p._id)}')">${esc(displayName(p))}</div>`).join("")
    : `<div class="mem-pick empty">无匹配姓名</div>`;
}
function pickMember(id){
  const p=state.people.find(x=>x._id===id);
  if(!p)return;
  $("#memname").value=displayName(p);
  setMember();
}
function setMember(){
  const v=$("#memname").value.trim();
  if(!v){alert("请填写正确的姓名信息～");return;}
  const p=state.people.find(x=>displayName(x)===v);
  if(!p){alert("未找到「"+v+"」，请从下拉中选择与报名表一致的姓名");return;}
  ctx.role="member"; ctx.me=p._id; ctx.tab="home"; render();
}
function askAdmin(){
  $("#pwdbox").innerHTML = `<div class="pwd">
    <input id="pw" type="text" placeholder="输入组织者口令" autocomplete="off">
    <div class="role-btn" style="margin-top:10px" onclick="checkAdmin()"><b>进入后台</b></div>
  </div>`;
  setTimeout(()=>$("#pw")&&$("#pw").focus(),100);
}
function checkAdmin(){
  const v=$("#pw").value.trim();
  if(v===ADMIN_PWD){ctx.role="admin";ctx.tab="admin";render();}
  else{alert("口令错误");}
}

/* ============== MAIN RENDER ============== */
function render(){
  if(!ctx.role){renderSplash();return;}
  const isAdmin = ctx.role==="admin";
  const title = isAdmin ? "组织者后台" : EVENT_TITLE;
  let body="";
  if(ctx.tab==="home") body = isAdmin ? adminHome() : memberHome();
  else if(ctx.tab==="edit") body = editForm();
  else if(ctx.tab==="schedule") body = scheduleView();
  else if(ctx.tab==="groups") body = groupsView();
  else if(ctx.tab==="notice") body = noticeView();
  else if(ctx.tab==="members") body = membersView();
  else if(ctx.tab==="tips") body = tipsView();
  else if(ctx.tab==="admin") body = adminTable();
  else if(ctx.tab==="me") body = memberHome();

  const sw = `<span class="sw" onclick="switchRole()">${isAdmin?"切换为参与者":"切换身份"}</span>`;
  const gearBtn = isAdmin ? `<button class="btn sm ghost" style="margin-left:8px;font-size:13px;padding:4px 10px;white-space:nowrap" onclick="openSettings()">⚙️</button>` : "";
  const syncBtn = (isAdmin && SYNC_ENABLED) ? `<button class="btn sm ghost" style="margin-left:auto;font-size:12px;padding:4px 10px;white-space:nowrap" onclick="genSyncLink()">📤 同步</button>` : "";
  app.innerHTML = `<div class="hd"><span class="t">${title}</span>${sw}${gearBtn}${syncBtn}</div><div class="page">${body}</div>${tabbar()}`;
}
function switchRole(){ctx.role=null;ctx.tab="home";render();}
function go(t){ctx.tab=t;render();}

function tabbar(){
  const isAdmin=ctx.role==="admin";
  const tabs = isAdmin
   ? [["admin","📋","数据后台"],["schedule","🗓","行程"],["groups","🚗","分组"],["notice","📢","公告"],["tips","📖","贴士"]]
   : [["home","🏠","我的"],["members","👥","成员"],["schedule","🗓","行程"],["groups","🚗","分组"],["notice","📢","公告"],["tips","📖","贴士"]];
  return `<div class="tabbar">`+tabs.map(([k,ic,lb])=>
    `<div class="tab ${ctx.tab===k||(k==='home'&&ctx.tab==='edit')?'on':''}" onclick="go('${k}')"><span class="ic">${ic}</span>${lb}</div>`
  ).join("")+`</div>`;
}

/* ============== MEMBER: 我的信息（通用·按模块分组） ============== */
function memberHome(){
  const me=findMe();
  const modules={};
  state.fields.forEach(f=>{(modules[f.module]=modules[f.module]||[]).push(f);});
  let cards=Object.keys(modules).map(m=>{
    const rows=modules[m].map(f=>{
      let v=valOf(me,f.key);
      if(f.sensitive){ v = (f.key.indexOf("手机")>=0||f.key.indexOf("电话")>=0)?maskPhone(v):(v?"已加密·仅组织者可见":""); }
      const lock = f.editor==="admin" ? `<span class="lockicon">🔒只读</span>` : "";
      const sens = f.sensitive ? `<span class="sens-badge">脱敏</span>`:"";
      return `<div class="row"><span class="k">${esc(f.label)}${lock}${sens}</span><span class="v ${v?'':'empty'}">${v?esc(v):"未填写"}</span></div>`;
    }).join("");
    return `<div class="card"><h3><span class="mod-tag">${esc(m)}</span></h3>${rows}</div>`;
  }).join("");

  const chips=(CHIP_FIELDS||[]).filter(k=>valOf(me,k)).map(k=>`<span class="chip">${esc(k)}: ${esc(valOf(me,k))}</span>`).join("");

  return `
  <div class="card">
    <div class="big-name">${esc(displayName(me))}</div>
    ${subLine(me)?`<div class="dept">${esc(subLine(me))}</div>`:`<div style="height:8px"></div>`}
    ${chips?`<div class="chips">${chips}</div>`:""}
  </div>
  ${cards}
  <button class="btn" onclick="go('edit')">✏️ 编辑我的资料</button>
  <div style="height:8px"></div>
  <div class="hint">切换到「组织者」身份可看到全部人员的完整信息并统一安排${GROUP_FIELDS&&GROUP_FIELDS.length?(" / "+GROUP_FIELDS.join(" / ")):""}。</div>
  <div style="height:8px"></div>
  <div class="role-btn ghost" onclick="resetData()"><b>♻️ 恢复初始数据（清本机缓存）</b></div>`;
}

/* ============== MEMBER: 编辑表单 ============== */
function editForm(){
  const me=findMe();
  const editable = state.fields.filter(f=>f.editor==="member");
  const bymod={};
  editable.forEach(f=>{(bymod[f.module]=bymod[f.module]||[]).push(f);});
  let html=`<div class="hint">这里只放「你自己要填」的字段；${GROUP_FIELDS&&GROUP_FIELDS.length?GROUP_FIELDS.join(" / ")+" 等":""}由组织者统一安排，你在上一页只能看。</div>`;
  Object.keys(bymod).forEach(m=>{
    html+=`<div class="card"><h3><span class="mod-tag">${esc(m)}</span></h3>`;
    bymod[m].forEach(f=>{
      const v=valOf(me,f.key);

function membersView(){

function memListHtml(meId,q){
  q=(q||"").trim();
  const arr=state.people.filter(p=>{
    if(!q) return true;
    const hay=[displayName(p),subLine(p),...GROUP_FIELDS.map(k=>valOf(p,k))].join(" ");
    return hay.indexOf(q)>=0;
  }).map(p=>({
    name:displayName(p),
    dept:subLine(p),
    id:p._id
  }));
  const meItem=arr.filter(m=>m.id===meId);

  return final.map(m=>`<div class="mem">
      <div class="mi">
        <div class="mn">${esc(m.name)} ${m.id===meId?'<span style="color:var(--brand)">●</span>':''}</div>
        <div class="md">${esc(m.dept)}</div>
      </div>
    </div>`).join("");
}

/* ============== 行程 ============== */
function scheduleRow(it){
  return `<div class="di"><div class="tt">${esc(it.start)}${it.end?'-'+esc(it.end):''} ${esc(it.act)}</div>${it.trans?`<div class="meta">🚗 ${esc(it.trans)}</div>`:""}</div>`;
}
function dayTabs(){
  return `<div class="daytabs">`+state.schedule.map((d,i)=>
    `<div class="dtab ${ctx.schedDay===i?'on':''}" onclick="goSchedDay(${i})"><div class="dw">${esc(d.week)}</div><div class="dd">${esc(d.date)}</div></div>`).join("")+`</div>`;
}
function goSchedDay(i){ctx.schedDay=i;render();}
function scheduleView(){
  const isAdmin=ctx.role==="admin";
  const ov=(state.overview||[]);
  const ovHtml = ov.length ? `<div class="card ov"><div class="ovh">🧭 行程概述 · 全程总览</div>`+
    ov.map(o=>`<div class="ovr"><span class="ovd">${esc(o.day)}</span><span class="ovrt">${esc(o.route)}</span><span class="ovk">${esc(o.km)}</span></div>`).join("")+`</div>` : "";
  // 防崩溃：行程为空或数据异常时给出友好提示，而非整页卡死
  if(!state.schedule || !state.schedule.length){
    return ovHtml + `<div class="empty-note" style="padding:40px 20px">📭 暂无行程数据<br><span style="font-size:12px;color:#94a3b8">组织者可在后台「数据后台」手动添加，或重新生成时上传行程表。</span></div>` + tabbar();
  }
  if(ctx.schedDay==null||ctx.schedDay>=state.schedule.length)ctx.schedDay=0;
  const d=state.schedule[ctx.schedDay];
  if(!d || !d.items) return ovHtml + `<div class="empty-note">行程数据异常</div>` + tabbar();
  const tabs=dayTabs();
  if(isAdmin){
    const items=d.items.map((it,i)=>`<div class="di"><div class="tt">${esc(it.start)}${it.end?'-'+esc(it.end):''} ${esc(it.act)}</div>${it.trans?`<div class="meta">🚗 ${esc(it.trans)}</div>`:''}<div style="margin-top:6px"><button class="mini" onclick="editSchedItem(${ctx.schedDay},${i})">改</button> <button class="mini del" onclick="delSchedItem(${ctx.schedDay},${i})">删</button></div></div>`).join("");
    const dayHtml=`<div class="day"><div class="dh">${esc(d.date)} ${esc(d.week)} · ${esc(d.title)}
      <span style="float:right"><button class="mini" onclick="editSchedDay(${ctx.schedDay})">改整天</button>
      <button class="mini del" onclick="delSchedDay(${ctx.schedDay})">删</button></span></div>
      ${items}${d.tip?`<div class="di"><div class="tip">⚠️ ${esc(d.tip)}</div></div>`:''}
      <div style="padding:10px 14px"><button class="btn sm" onclick="addSchedItem(${ctx.schedDay})">+ 新增时段</button></div></div>`;
    return ovHtml+tabs+dayHtml+`<button class="btn" onclick="editSchedDay(-1)">+ 新增一天行程</button>`;
  }
  return ovHtml+tabs+`<div class="day"><div class="dh">${esc(d.date)} ${esc(d.week)} · ${esc(d.title)}</div>${d.items.map(scheduleRow).join("")}${d.tip?`<div class="di"><div class="tip">⚠️ ${esc(d.tip)}</div></div>`:''}</div>`;
}
function editSchedDay(di){
  const d = di<0?{date:'',week:'',title:'',tip:''}:state.schedule[di];
  const hf=(k,lab)=>`<div class="f-item"><label>${lab}</label><input data-sk="${k}" value="${esc(d[k]||'')}"></div>`;
  showSheet(`<h3>${di<0?'新增行程日':'编辑当日信息'}</h3>${hf('week','第几天（如 D1）')}${hf('date','日期（如 11月08日）')}${hf('title','当日主题 / 路线')}${hf('tip','注意事项')}<button class="btn" onclick="saveSchedDay(${di})">保存</button><div style="height:8px"></div><button class="btn ghost" onclick="closeSheet()">取消</button>`);
}

function showSheet(inner){

let _confirmCb=null;

function savePwd(){

  if(!v){toast("口令不能为空");return;}
  try{localStorage.setItem(PWD_KEY,v);}catch(e){}
  ADMIN_PWD=v; toast("口令已更新 ✅"); closeSheet();
}
function exportData(){
  const payload={people:state.people, schedule:state.schedule, notices:state.notices};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=(EVENT_TITLE||"团建")+"_数据.json";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  toast("已导出数据文件");
}
function importData(){
  const inp=document.createElement("input");
  inp.type="file";
  inp.accept=".json,.txt,text/plain,application/json,*/*";
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const d=JSON.parse(rd.result);
        if(!d.people&&!d.schedule&&!d.notices) throw new Error("不是有效的数据文件（缺少 people/schedule/notices 字段）");
        if(d.people) state.people=d.people;
        if(d.schedule) state.schedule=d.schedule;
        if(d.notices) state.notices=d.notices;
        if(d.tips) state.tips=d.tips; if(d.overview) state.overview=d.overview;
        persist(); toast("导入成功 ✅"); closeSheet(); render();
      }catch(e){ alert("导入失败："+(e.message||"文件格式不对，请确认是「导出数据文件」生成的 JSON 文件")); }
    };
    rd.readAsText(f);
  };
  inp.click();
}

/* ============== 同步（短链模式：数据存组织者自己的仓库） ============== */
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";t.style.cssText="position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:rgba(17,24,39,.92);color:#fff;padding:10px 16px;border-radius:22px;font-size:13px;z-index:99;max-width:90vw;text-align:center;transition:opacity .3s";document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity="1";
  clearTimeout(t._tm); t._tm=setTimeout(()=>{t.style.opacity="0";},2200);
}
async function copyTextAsync(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    try{ await navigator.clipboard.writeText(text); return true; }catch(e){}
  }
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.cssText="position:fixed;left:-9999px;top:0;opacity:0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{ document.execCommand("copy"); return true; }catch(e){ return false; }
  finally{ ta.remove(); }
}
const SYNC_API = "https://api.github.com/repos/" + SYNC_REPO + "/contents/" + SYNC_FILE;
async function genSyncLink(){
  const SENS=["手机号","身份证号","手机","电话","身份证"];
  const peopleForSync=state.people.map(p=>{const o=Object.assign({},p);SENS.forEach(k=>{ if(o[k]!==undefined) o[k]=""; });return o;});
  const payload={people:peopleForSync, schedule:state.schedule, notices:state.notices, _ts:Date.now()};

  showSheet(`
    <h3>📤 正在生成同步链接...</h3>
    <div style="text-align:center;padding:20px 0">
      <div style="display:inline-block;width:32px;height:32px;border:3px solid #93c5fd;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <div style="margin-top:10px;font-size:13px;color:#6b7280">正在把数据上传到你的仓库...</div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <div id="sync-result"></div>
  `);

  try{
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    let sha = "";
    try{
      const r = await fetch(SYNC_API, {headers:{Authorization:"Bearer "+GITHUB_SYNC_TOKEN}});
      if(r.ok){ const d = await r.json(); sha = d.sha; }
    }catch(e){}

    const body = {message:"sync: "+new Date().toLocaleString('zh-CN'), content:content, branch:SYNC_BRANCH};
    if(sha) body.sha = sha;

    const wr = await fetch(SYNC_API, {
      method: "PUT",
      headers:{Authorization:"Bearer "+GITHUB_SYNC_TOKEN, "Accept":"application/vnd.github+json", "Content-Type":"application/json"},
      body:JSON.stringify(body)
    });

    if(!wr.ok){
      const errText = await wr.text().catch(()=>"未知错误");
      throw new Error("GitHub API 返回 "+wr.status+": "+errText.slice(0,200));
    }

    const shortUrl = location.origin+location.pathname+"?s=1";
    document.getElementById("sync-result").innerHTML = `
      <div style="color:#059669;font-size:14px;margin-bottom:12px">✅ 数据已上传到你自己的仓库！</div>
      <div class="hint">下面的链接非常短，直接复制发到微信群即可：</div>
      <div style="background:#eff6ff;border:2px solid #3b82f6;padding:12px;border-radius:10px;margin:10px 0;text-align:center">
        <div id="sync-short-url" style="font-size:15px;color:#1e40af;font-weight:600;word-break:all;user-select:text;-webkit-user-select:text;padding:4px">${esc(shortUrl)}</div>
      </div>
      <button class="btn" onclick="doCopyShortLink()">① 复制链接</button>
      <div class="hint" style="margin-top:10px;text-align:left">
        <strong>② 发到微信群：</strong><br>
        1. 点「复制链接」→ 手机会提示"已复制"<br>
        2. 打开<strong>微信</strong> → 进群 → 输入框<strong>长按 → 粘贴</strong> → 发送<br>
        3. 群友点这个蓝色链接 → 自动同步 ✅
      </div>
      <div style="height:8px"></div>
      <button class="btn ghost" onclick="closeSheet()">关闭</button>
    `;
  }catch(e){
    document.getElementById("sync-result").innerHTML = `
      <div style="color:#dc2626;font-size:14px;margin-bottom:8px">❌ 上传失败</div>
      <div style="font-size:12px;color:#6b7280;background:#fef2f2;padding:8px;border-radius:8px">${esc(e.message||"网络错误")}</div>
      <div class="hint" style="margin-top:8px;text-align:left">
        可能的原因：<br>
        • 网络不通（检查手机是否联网）<br>
        • 同步令牌无效 / 仓库名写错（需在生成时填对你自己的仓库+令牌）<br>
        • GitHub 服务暂时不可用<br>
        <br>请稍后重试。
      </div>
      <div style="height:8px"></div>
      <button class="btn ghost" onclick="closeSheet()">关闭</button>
    `;
  }
}
async function doCopyShortLink(){
  const url = document.getElementById("sync-short-url").textContent;
  if(!url){toast("没有可复制的链接");return;}
  const ok = await copyTextAsync(url);
  toast(ok ? "已复制链接 ✅（去微信粘贴发送吧）" : "复制失败，请手动长按上方链接复制");
}
async function applyRemoteSync(){
  const overlay = document.createElement("div");
  overlay.id = "sync-overlay";
  overlay.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center";
  overlay.innerHTML = `
    <div style="width:36px;height:36px;border:3.5px solid #93c5fd;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite"></div>
    <div style="margin-top:16px;font-size:15px;color:#374151;font-weight:500">正在同步最新数据...</div>
    <div style="margin-top:6px;font-size:12px;color:#9ca3af">从组织者仓库获取最新安排</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  `;
  document.body.appendChild(overlay);
  try{
    const rawUrl = location.origin + "/" + SYNC_FILE;
    const r = await fetch(rawUrl + "?_t=" + Date.now(), {cache:"no-cache"});
    if(!r.ok) throw new Error("服务器返回 "+r.status);
    const text = await r.text();
    if(!text || text.length < 10) throw new Error("数据为空");
    const data = JSON.parse(text);
    if(data.people){
      const SENS=["手机号","身份证号","手机","电话","身份证"];
      const localMap=new Map(state.people.map(p=>[p._id,p]));
      state.people=data.people.map(p=>{
        const local=localMap.get(p._id);
        if(local){ SENS.forEach(k=>{ if(!p[k] && local[k]) p[k]=local[k]; }); }
        return p;
      });
    }
    if(data.schedule) state.schedule=data.schedule;
    if(data.notices) state.notices=data.notices;
    persist();
    overlay.innerHTML = `
      <div style="font-size:40px">✅</div>
      <div style="margin-top:12px;font-size:16px;color:#059669;font-weight:600">同步完成！</div>
      <div style="margin-top:4px;font-size:13px;color:#6b7280">已获取组织者最新安排</div>
    `;
    setTimeout(() => {
      const ov = document.getElementById("sync-overlay");
      if(ov) ov.remove();
      renderSplash();
    }, 1200);
  }catch(e){
    overlay.innerHTML = `
      <div style="font-size:36px">⚠️</div>
      <div style="margin-top:12px;font-size:15px;color:#dc2626;font-weight:600">同步失败</div>
      <div style="margin-top:6px;font-size:12px;color:#6b7280;max-width:280px;text-align:center">${esc(e.message||"无法连接服务器")}</div>
      <div style="margin-top:16px">
        <button class="btn" onclick="location.href=location.pathname">进入网页</button>
      </div>
    `;
  }
}
async function init(){
  const params = new URLSearchParams(location.search);
  if(params.get("s") === "1"){
    try{ history.replaceState(null,"",location.pathname); }catch(e){}
    if(SYNC_ENABLED){ await applyRemoteSync(); return; }
    else { toast("该小程序未配置同步后台"); }
  }
  const h=location.hash||"";
  const m=h.match(/#sync=(.+)$/);
  if(m){ toast("⚠️ 这是旧版同步链接，可能已失效。请组织者重新生成。"); try{ history.replaceState(null,"",location.pathname); }catch(e){} }
  renderSplash();
}
init();
